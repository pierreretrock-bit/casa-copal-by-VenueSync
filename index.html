<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa Copal Admin - VenueSync</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
          "react-dom": "https://esm.sh/react-dom@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react"
        }
      }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, collection, onSnapshot, addDoc, doc, updateDoc, deleteDoc, getDocs, setDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        import { LayoutDashboard, CalendarDays, WalletCards, Users, Megaphone, LogOut, CheckCircle2, AlertCircle, TrendingUp, FileText, Copy, UserCircle, Settings, Lock, Sparkles, Loader2, FileSpreadsheet, Menu, X } from 'lucide-react';

        // ============================================================================
        // 1. CONFIGURACIÓN FIREBASE
        // ============================================================================
        const firebaseConfig = {
          apiKey: "AIzaSyDSyCBJ3VeLNYgFjo4qo3pysBJPYEfmryQ",
          authDomain: "casa-copal-web.firebaseapp.com",
          projectId: "casa-copal-web",
          storageBucket: "casa-copal-web.firebasestorage.app",
          messagingSenderId: "1066820914348",
          appId: "1:1066820914348:web:ba00a2fdac45b4f478a309"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ============================================================================
        // 2. UTILIDAD GEMINI API (IA) - REPARADA
        // ============================================================================
        const callGeminiAI = async (prompt, expectJson = false) => {
            const apiKey = "AIzaSyDCFd4xJLZ7wazjwZ5cGLnl-z8PhQfKncY"; 
            const modelVersion = "gemini-1.5-flash"; 
            const url = "https://generativelanguage.googleapis.com/v1beta/models/" + modelVersion + ":generateContent?key=" + apiKey;
            
            let finalPrompt = "Eres un asistente de negocios para un salón de eventos familiares llamado Casa Copal.\n\n" + prompt;
            if (expectJson) {
                finalPrompt += "\n\nIMPORTANTE: Devuelve ÚNICAMENTE un objeto JSON válido. No incluyas texto adicional ni bloques de formato.";
            }

            const payload = { contents: [{ parts: [{ text: finalPrompt }] }] };

            let retries = 3;
            let delay = 2000;

            while (retries > 0) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    const data = await response.json();
                    
                    if (!response.ok) {
                        const errMsg = data.error?.message || '';
                        if (errMsg.toLowerCase().includes("high demand") || response.status === 503 || response.status === 429) {
                            throw new Error("HIGH_DEMAND");
                        }
                        throw new Error(errMsg || 'Error de Google API');
                    }
                    
                    let textResult = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if(!textResult) throw new Error('La IA devolvió una respuesta vacía.');
                    
                    if (expectJson) {
                        // Limpieza segura del JSON usando código ASCII para evitar el SyntaxError
                        const tick3 = String.fromCharCode(96, 96, 96);
                        textResult = textResult.replace(new RegExp(tick3 + 'json\n?', 'g'), '').replace(new RegExp(tick3 + '\n?', 'g'), '').trim();
                        return JSON.parse(textResult);
                    }
                    
                    return textResult;
                } catch (error) {
                    retries--;
                    if (retries === 0) {
                        if (error.message === "HIGH_DEMAND") {
                            throw new Error("Los servidores de IA están saturados en este momento. Espera unos segundos y vuelve a intentar.");
                        }
                        throw error;
                    }
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 1.5; 
                }
            }
        };

        const TEAM_PROFILES = {
          'pierreretrock@gmail.com': { id: 'admin', name: 'Pierre', role: 'Administrador', canViewAll: true },
          'faviolavizcarratirado@gmail.com': { id: 'fabiola', name: 'Fabiola', role: 'Finanzas', canViewAll: true },
          'gpecamargo19@gmail.com': { id: 'lupita', name: 'Lupita', role: 'Capturista', canViewAll: false }
        };

        function CasaCopalAdmin() {
          const [user, setUser] = useState(null);
          const [activeProfile, setActiveProfile] = useState(null);
          const [activeTab, setActiveTab] = useState('dashboard');
          const [toast, setToast] = useState({ show: false, msg: '', type: 'success' });
          const [isAuthChecking, setIsAuthChecking] = useState(true);
          const [dbError, setDbError] = useState(''); 
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

          const [loginEmail, setLoginEmail] = useState('');
          const [loginPassword, setLoginPassword] = useState('');
          const [loginError, setLoginError] = useState('');

          const [bookings, setBookings] = useState([]);
          const [expenses, setExpenses] = useState([]);
          const [clients, setClients] = useState([]);
          const [clientNotes, setClientNotes] = useState({});
          const [expenseCategories, setExpenseCategories] = useState([]);
          const [quotes, setQuotes] = useState([]); 
          const [quoteToConvert, setQuoteToConvert] = useState(null); 

          useEffect(() => {
            const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
              setUser(currentUser);
              if (currentUser && currentUser.email) {
                const profile = TEAM_PROFILES[currentUser.email] || { id: 'guest', name: 'Usuario Limitado', role: 'Invitado', canViewAll: false };
                setActiveProfile({ ...profile, email: currentUser.email });
                if (!profile.canViewAll) setActiveTab('expenses');
                else setActiveTab('dashboard');
              }
              setIsAuthChecking(false);
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;

            const bookingsRef = collection(db, 'reservaciones');
            const expensesRef = collection(db, 'gastos');
            const categoriesRef = collection(db, 'categorias_gastos');
            const quotesRef = collection(db, 'cotizaciones');
            const clientsRef = collection(db, 'clientes'); 

            const handleDbError = (err) => {
              console.error("Firestore Error Capturado de forma segura:", err);
              if (err.code === 'permission-denied') {
                setDbError('⛔ Faltan Permisos en Firebase: Debes agregar la regla "allow read, write: if request.auth != null;" para las colecciones "clientes" y "cotizaciones" en tu consola.');
              } else {
                setDbError('Error DB: ' + err.message);
              }
            };

            const checkCategories = async () => {
              try {
                const snap = await getDocs(categoriesRef);
                if (snap.empty) {
                  const defaults = ['Mantenimiento', 'Servicios Públicos', 'Insumos/Limpieza', 'Nómina', 'Publicidad'];
                  defaults.forEach(c => addDoc(categoriesRef, { name: c }));
                }
              } catch (err) {
                handleDbError(err);
              }
            };
            checkCategories();

            const unsubBookings = onSnapshot(bookingsRef, (snapshot) => {
              setDbError(''); 
              const data = snapshot.docs.map(doc => {
                  const d = doc.data();
                  let rawDate = d.date || d.fecha || d.dia || '';
                  if (!rawDate && d.timestamp) {
                      try {
                          const dateObj = typeof d.timestamp === 'number' ? new Date(d.timestamp) : new Date(d.timestamp.toDate());
                          rawDate = dateObj.toISOString().split('T')[0];
                      } catch(e) {}
                  }

                  d._fechaStr = rawDate || doc.id;
                  d._nombreStr = d.cliente_nombre || d.nombre || 'Sin Nombre';
                  d._telefonoStr = d.cliente_telefono || d.telefono || '';
                  d._correoStr = d.cliente_correo || d.correo || '';
                  d._precioTotal = Number(d.precio_total || d.total || 0);
                  d._anticipo = Number(d.anticipo || d.enganche || 0);
                  
                  d._status = d.status || 'Pendiente';
                  if (d._precioTotal === 0) {
                      d._status = 'Liquidado'; 
                  } else if (d._anticipo >= d._precioTotal && d._precioTotal > 0) {
                      d._status = 'Liquidado';
                  } else if (d._anticipo > 0 && d._status === 'Pendiente') {
                      d._status = 'Anticipado';
                  }

                  return { id: doc.id, ...d };
              });
              
              data.sort((a, b) => {
                  if (a._fechaStr > b._fechaStr) return -1;
                  if (a._fechaStr < b._fechaStr) return 1;
                  return 0;
              });
              
              setBookings(data);

              const uniqueClients = {};
              data.filter(b => b._status === 'Anticipado' || b._status === 'Liquidado' || b._status === 'Confirmada').forEach(res => {
                const rawPhone = res._telefonoStr;
                if (rawPhone) {
                  let cleanPhone = rawPhone.replace(/\D/g, '');
                  if (cleanPhone.length > 10) cleanPhone = cleanPhone.slice(-10);

                  if (!uniqueClients[cleanPhone]) {
                    uniqueClients[cleanPhone] = { id: cleanPhone, name: res._nombreStr, phone: rawPhone, totalBookings: 0, totalSpent: 0 };
                  }
                  uniqueClients[cleanPhone].totalBookings += 1;
                  uniqueClients[cleanPhone].totalSpent += res._precioTotal;
                }
              });
              setClients(Object.values(uniqueClients));
            }, handleDbError);

            const unsubExpenses = onSnapshot(expensesRef, (snapshot) => {
              const data = snapshot.docs.map(doc => {
                  const d = doc.data();
                  let rawDate = d.date || d.fecha || d.dia || '';
                  if (!rawDate && d.timestamp) {
                      try {
                          const dateObj = typeof d.timestamp === 'number' ? new Date(d.timestamp) : new Date(d.timestamp.toDate());
                          rawDate = dateObj.toISOString().split('T')[0];
                      } catch(e) {}
                  }

                  d._fechaStr = rawDate || doc.id;
                  d._monto = Number(d.amount || d.monto || 0);
                  d._desc = d.description || d.descripcion || 'Sin descripción';
                  d._cat = d.category || d.categoria || 'General';
                  d._status = d.status || 'Pagado';
                  
                  return { id: doc.id, ...d };
              });
              
              data.sort((a, b) => {
                  if (a._fechaStr > b._fechaStr) return -1;
                  if (a._fechaStr < b._fechaStr) return 1;
                  return 0;
              });
              setExpenses(data);
            }, handleDbError);

            const unsubCategories = onSnapshot(categoriesRef, (snapshot) => {
              const data = snapshot.docs.map(doc => ({ id: doc.id, name: doc.data().name }));
              data.sort((a, b) => a.name.localeCompare(b.name));
              setExpenseCategories(data);
            }, handleDbError);

            const unsubQuotes = onSnapshot(quotesRef, (snapshot) => {
              const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              data.sort((a, b) => b.timestamp - a.timestamp);
              setQuotes(data);
            }, handleDbError);

            const unsubClientsNotes = onSnapshot(clientsRef, (snapshot) => {
              const notes = {};
              snapshot.docs.forEach(doc => { notes[doc.id] = doc.data().notas; });
              setClientNotes(notes);
            }, handleDbError);

            return () => { unsubBookings(); unsubExpenses(); unsubCategories(); unsubQuotes(); unsubClientsNotes(); };
          }, [user]);

          const handleLogin = async (e) => {
            e.preventDefault();
            setLoginError('');
            try {
              await signInWithEmailAndPassword(auth, loginEmail, loginPassword);
            } catch (error) {
              setLoginError('Error de Firebase: ' + error.code);
            }
          };

          const handleLogout = () => {
            signOut(auth);
          };

          const showToast = (msg, type = 'success') => {
            setToast({ show: true, msg, type });
            setTimeout(() => setToast({ show: false, msg: '', type: 'success' }), 3000);
          };

          const handleCopyText = (text) => {
            try {
              const textArea = document.createElement("textarea");
              textArea.value = text;
              textArea.style.top = "0";
              textArea.style.left = "0";
              textArea.style.position = "fixed";
              document.body.appendChild(textArea);
              textArea.focus();
              textArea.select();
              const successful = document.execCommand('copy');
              document.body.removeChild(textArea);
              if (successful) showToast('Texto copiado al portapapeles');
              else showToast('Error al copiar el texto', 'error');
            } catch (err) {
              showToast('Error al copiar el texto', 'error');
            }
          };

          const totalIncome = useMemo(() => bookings.reduce((sum, b) => {
            if (b._status === 'Liquidado') return sum + b._precioTotal;
            if (b._status === 'Anticipado' || b._status === 'Confirmada') return sum + b._anticipo;
            return sum;
          }, 0), [bookings]);

          const totalExpenses = useMemo(() => expenses.filter(e => e._status === 'Pagado' || !e._status).reduce((sum, e) => sum + e._monto, 0), [expenses]);
          const netProfit = totalIncome - totalExpenses;

          if (isAuthChecking) return (
            <div className="flex flex-col h-screen items-center justify-center bg-slate-900 text-white space-y-4">
              <Loader2 className="w-12 h-12 text-emerald-500 animate-spin" />
              <p className="text-sm font-bold tracking-widest uppercase text-slate-400">Conectando con VenueSync...</p>
            </div>
          );

          if (!user) return (
            <div className="flex h-screen bg-slate-50 items-center justify-center p-4">
              <div className="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 w-full max-w-sm animate-fade-in text-center">
                <div className="w-16 h-16 bg-slate-900 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-md">
                  <Lock className="text-emerald-400 w-8 h-8"/>
                </div>
                <h1 className="text-2xl font-black text-slate-800 mb-1">Casa Copal</h1>
                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-8">Admin Panel</p>
                
                <form onSubmit={handleLogin} className="space-y-4 text-left">
                  {loginError && <div className="bg-rose-50 text-rose-600 text-xs p-3 rounded-lg font-bold text-center border border-rose-100">{loginError}</div>}
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">Correo Electrónico</label>
                    <input type="email" required className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-emerald-500 focus:bg-white transition-colors" value={loginEmail} onChange={e=>setLoginEmail(e.target.value)} />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">Contraseña</label>
                    <input type="password" required className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-emerald-500 focus:bg-white transition-colors" value={loginPassword} onChange={e=>setLoginPassword(e.target.value)} />
                  </div>
                  <button type="submit" className="w-full bg-slate-900 text-white font-bold py-3.5 rounded-xl hover:bg-emerald-600 transition-colors shadow-lg mt-2">
                    Iniciar Sesión
                  </button>
                </form>
              </div>
            </div>
          );

          return (
            <div className="flex flex-col md:flex-row h-screen bg-slate-50 text-slate-800 font-sans overflow-hidden">
              
              {/* ENCABEZADO MÓVIL */}
              <div className="md:hidden bg-slate-900 text-white p-4 flex items-center justify-between shadow-md z-30 shrink-0">
                <h1 className="text-xl font-black text-emerald-400">Casa Copal</h1>
                <button onClick={() => setIsMobileMenuOpen(true)} className="p-2 text-slate-300 hover:text-white">
                  <Menu className="w-6 h-6" />
                </button>
              </div>

              {/* FONDO OSCURO MÓVIL */}
              {isMobileMenuOpen && (
                <div className="fixed inset-0 bg-black/60 z-40 md:hidden backdrop-blur-sm" onClick={() => setIsMobileMenuOpen(false)}></div>
              )}

              {/* BARRA LATERAL (SIDEBAR) */}
              <aside className={`fixed md:static inset-y-0 left-0 w-64 bg-slate-900 text-white flex flex-col shadow-2xl md:shadow-xl z-50 shrink-0 transform transition-transform duration-300 ease-in-out ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                <div className="p-6 border-b border-slate-800 flex justify-between items-start">
                  <div>
                    <h1 className="text-2xl font-black tracking-tight text-emerald-400">Casa Copal</h1>
                    <p className="text-[10px] text-slate-400 mt-1.5 uppercase tracking-widest font-bold">Admin</p>
                  </div>
                  <button onClick={() => setIsMobileMenuOpen(false)} className="md:hidden text-slate-400 hover:text-white">
                    <X className="w-6 h-6" />
                  </button>
                </div>
                
                <div className="p-4 bg-slate-800/50 flex justify-between items-center border-b border-slate-800">
                  <div className="truncate pr-2">
                    <p className="text-[10px] text-emerald-400 uppercase font-bold"><UserCircle className="inline w-3 h-3 mr-1"/> {activeProfile.role}</p>
                    <p className="font-semibold text-sm truncate">{activeProfile.name}</p>
                  </div>
                  <button onClick={handleLogout} className="hover:text-rose-400 text-slate-400 transition-colors"><LogOut className="w-4 h-4"/></button>
                </div>

                <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
                  {activeProfile.canViewAll && (
                    <>
                      <NavBtn icon={<LayoutDashboard/>} label="Dashboard" tab="dashboard" activeTab={activeTab} setActiveTab={setActiveTab} close={() => setIsMobileMenuOpen(false)} />
                      <NavBtn icon={<CalendarDays/>} label="Reservas" tab="bookings" activeTab={activeTab} setActiveTab={setActiveTab} close={() => setIsMobileMenuOpen(false)} badge={bookings.filter(b => b._status === 'Pendiente' || b._status === 'Anticipado').length} />
                      <NavBtn icon={<FileText/>} label="Cotizaciones" tab="quotes" activeTab={activeTab} setActiveTab={setActiveTab} close={() => setIsMobileMenuOpen(false)} />
                    </>
                  )}
                  <NavBtn icon={<WalletCards/>} label="Gastos" tab="expenses" activeTab={activeTab} setActiveTab={setActiveTab} close={() => setIsMobileMenuOpen(false)} />
                  
                  {activeProfile.canViewAll && (
                    <>
                      <NavBtn icon={<Users/>} label="Clientes VIP" tab="clients" activeTab={activeTab} setActiveTab={setActiveTab} close={() => setIsMobileMenuOpen(false)} />
                      <div className="pt-4 mt-4 border-t border-slate-800">
                        <p className="text-xs font-bold text-slate-500 uppercase tracking-widest px-4 mb-2">Herramientas</p>
                        <NavBtn icon={<Megaphone/>} label="Hub Ventas" tab="marketing" activeTab={activeTab} setActiveTab={setActiveTab} close={() => setIsMobileMenuOpen(false)} />
                      </div>
                    </>
                  )}
                </nav>
              </aside>

              {/* CONTENIDO PRINCIPAL */}
              <main className="flex-1 overflow-y-auto p-4 md:p-8 relative">
                {toast.show && (
                  <div className={`absolute top-6 right-6 z-50 px-6 py-3 rounded-xl shadow-lg flex items-center gap-3 text-white transform transition-all ${toast.type === 'success' ? 'bg-emerald-600' : 'bg-rose-600'}`}>
                    {toast.type === 'success' ? <CheckCircle2 className="w-5 h-5"/> : <AlertCircle className="w-5 h-5"/>}
                    <span className="font-semibold text-sm">{toast.msg}</span>
                  </div>
                )}

                {dbError && (
                  <div className="bg-rose-100 border border-rose-400 text-rose-800 px-6 py-4 rounded-2xl mb-8 flex items-center gap-4 shadow-sm">
                    <AlertCircle className="w-6 h-6 shrink-0 text-rose-600" />
                    <p className="text-sm font-bold">{dbError}</p>
                  </div>
                )}
                
                {activeTab === 'dashboard' && activeProfile.canViewAll && (
                  <div className="animate-fade-in space-y-6 pb-10">
                    <div>
                      <h2 className="text-3xl font-black text-slate-800">Resumen Financiero</h2>
                      <p className="text-slate-500 font-medium">Ingresos reales: <span className="text-emerald-600 font-bold">Anticipos + Eventos Liquidados</span>.</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                      <StatCard title="Ingresos (Caja Real)" amount={totalIncome} icon={<TrendingUp/>} color="text-emerald-600 bg-emerald-50 border-emerald-100" />
                      <StatCard title="Gastos (Pagados)" amount={totalExpenses} icon={<WalletCards/>} color="text-rose-600 bg-rose-50 border-rose-100" />
                      <StatCard title="Utilidad (Profit)" amount={netProfit} icon={<LayoutDashboard/>} color="text-blue-600 bg-blue-50 border-blue-100" />
                    </div>

                    <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-4 md:p-6 overflow-x-auto mt-8">
                        <h3 className="text-lg font-bold text-slate-800 mb-4 border-b border-slate-100 pb-3">Próximos Eventos</h3>
                        <table className="w-full text-left min-w-[600px]">
                            <thead>
                                <tr className="bg-slate-50 text-slate-400 text-xs uppercase tracking-wider">
                                    <th className="p-3 font-bold rounded-tl-xl">Fecha</th>
                                    <th className="p-3 font-bold">Cliente</th>
                                    <th className="p-3 font-bold">Total / Anticipo</th>
                                    <th className="p-3 font-bold rounded-tr-xl">Estado</th>
                                </tr>
                            </thead>
                            <tbody>
                                {bookings.filter(b => b._fechaStr >= new Date().toISOString().split('T')[0]).slice(0, 8).map(b => (
                                    <tr key={b.id} className="border-b border-slate-50 hover:bg-slate-50/80 transition-colors">
                                        <td className="p-3 font-bold text-slate-700">{b._fechaStr}</td>
                                        <td className="p-3 text-sm font-bold text-slate-600">{b._nombreStr}</td>
                                        <td className="p-3">
                                          <p className="font-black text-slate-800">${b._precioTotal.toLocaleString()}</p>
                                          <p className="text-xs text-slate-500">Ant: ${b._anticipo.toLocaleString()}</p>
                                        </td>
                                        <td className="p-3">
                                          <span className={`text-[10px] font-bold px-2 py-1 rounded-md uppercase ${b._status === 'Liquidado' ? 'bg-emerald-100 text-emerald-700' : b._status === 'Anticipado' || b._status === 'Confirmada' ? 'bg-blue-100 text-blue-700' : 'bg-amber-100 text-amber-700'}`}>
                                            {b._status}
                                          </span>
                                        </td>
                                    </tr>
                                ))}
                                {bookings.filter(b => b._fechaStr >= new Date().toISOString().split('T')[0]).length === 0 && <tr><td colSpan="4" className="p-8 text-center text-slate-400">Sin eventos próximos</td></tr>}
                            </tbody>
                        </table>
                    </div>
                  </div>
                )}
                
                {activeTab === 'bookings' && activeProfile.canViewAll && <BookingsModule db={db} bookings={bookings} showToast={showToast} initialData={quoteToConvert} clearData={()=>setQuoteToConvert(null)} />}
                {activeTab === 'quotes' && activeProfile.canViewAll && <QuotesModule db={db} quotes={quotes} showToast={showToast} onConv={(q)=>{setQuoteToConvert(q); setActiveTab('bookings');}} />}
                {activeTab === 'expenses' && <ExpensesModule db={db} expenses={expenses} cats={expenseCategories} prof={activeProfile} showToast={showToast} callAI={callGeminiAI} />}
                {activeTab === 'clients' && activeProfile.canViewAll && <ClientsModule db={db} clients={clients} notes={clientNotes} showToast={showToast} />}
                {activeTab === 'marketing' && activeProfile.canViewAll && <MarketingHub copy={handleCopyText} showToast={showToast} callAI={callGeminiAI} />}
              </main>
            </div>
          );
        }

        // ============================================================================
        // SUB-COMPONENTES 
        // ============================================================================

        const NavBtn = ({icon, label, tab, activeTab, setActiveTab, close, badge}) => (
          <button onClick={()=>{setActiveTab(tab); if(close) close();}} className={`w-full flex items-center justify-between px-4 py-3 rounded-xl transition-all font-medium ${activeTab === tab ? 'bg-emerald-600 text-white font-bold' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
            <div className="flex items-center gap-3">{React.cloneElement(icon,{className:'w-5 h-5'})} <span className="text-sm">{label}</span></div>
            {badge > 0 && <span className={`text-[10px] font-black px-2 py-0.5 rounded-md ${activeTab === tab ? 'bg-white text-emerald-700' : 'bg-rose-500 text-white'}`}>{badge}</span>}
          </button>
        );

        function StatCard({ title, amount, icon, color }) {
          return (
            <div className={`p-6 rounded-3xl border shadow-sm flex items-center justify-between ${color}`}>
              <div>
                <p className="text-[10px] font-black uppercase tracking-widest opacity-70 mb-1">{title}</p>
                <h4 className="text-3xl font-black">${amount.toLocaleString('es-MX')}</h4>
              </div>
              <div className="w-12 h-12 rounded-full bg-white/50 flex items-center justify-center">
                {React.cloneElement(icon, { className: 'w-6 h-6' })}
              </div>
            </div>
          );
        }

        function BookingsModule({ db, bookings, showToast, initialData, clearData }) {
          const [form, setForm] = useState({ date:'', name:'', phone:'', email:'', isWknd:false, depto:false, disc:0, ant:'' });
          const [editB, setEditB] = useState(null);
          
          useEffect(() => { 
            if(initialData) { 
              const d = new Date(initialData.date+'T12:00:00'); 
              setForm({date:initialData.date, name:initialData.cliente_nombre||'', phone:initialData.cliente_telefono||'', email:initialData.cliente_correo||'', isWknd:[0,5,6].includes(d.getDay()), depto:initialData.depto_incluido, disc:initialData.descuento_aplicado, ant:''}); 
              clearData(); 
            } 
          }, [initialData]);

          const calcTotal = useMemo(() => { 
            let t = (form.isWknd ? 5000 : 4000) + (form.depto ? (form.isWknd ? 2000 : 1600) : 0); 
            return t - (t * ((form.disc||0)/100)); 
          }, [form]);

          const exportCSV = () => { 
            const csv = ['Fecha,Cliente,Telefono,Correo,Total,Anticipo,Estatus,Depto Incluido,Origen'].concat(bookings.map(b=>`${b._fechaStr},"${b._nombreStr}",${b._telefonoStr},${b._correoStr},${b._precioTotal},${b._anticipo},${b._status},${b.depto_incluido?'Si':'No'},${b.origen||'interno'}`)).join('\n'); 
            const l=document.createElement('a'); 
            l.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'})); 
            l.download=`CasaCopal_Reservas_${new Date().toISOString().split('T')[0]}.csv`; 
            l.click(); 
          };

          const handleSave = async (e) => { 
            e.preventDefault(); 
            const a = Number(form.ant)||0; 
            try{ 
              await setDoc(doc(db,'reservaciones',form.date), {date:form.date, status:a>0?'Anticipado':'Pendiente', precio_total:calcTotal, anticipo:a, depto_incluido:form.depto, cliente_nombre:form.name, cliente_telefono:form.phone, cliente_correo:form.email, descuento_aplicado:form.disc, origen:'interno', timestamp:Date.now()}); 
              showToast('Reserva Guardada'); 
              setForm({date:'',name:'',phone:'',email:'',isWknd:false,depto:false,disc:0,ant:''}); 
            }catch(e){showToast('Error','error');} 
          };

          const handleUpdate = async (e) => { 
            e.preventDefault(); 
            const t = Number(editB.precio_total); 
            const a = Number(editB.anticipo); 
            try{ 
              await updateDoc(doc(db,'reservaciones',editB.id), {cliente_nombre:editB.cliente_nombre, cliente_telefono:editB.cliente_telefono, cliente_correo:editB.cliente_correo, precio_total:t, anticipo:a, status:t===0?'Liquidado':(a>=t&&t>0?'Liquidado':(a>0?'Anticipado':'Pendiente')), depto_incluido:editB.depto_incluido}); 
              showToast('Actualizado'); 
              setEditB(null); 
            }catch(e){showToast('Error','error');} 
          };

          const del = async (id) => { if(window.confirm('¿Eliminar reserva?')){ await deleteDoc(doc(db,'reservaciones',id)); showToast('Liberado'); } };
          const liq = async (b) => { if(window.confirm('¿Liquidar evento?')){ await updateDoc(doc(db,'reservaciones',b.id),{status:'Liquidado',anticipo:Number(b._precioTotal)}); showToast('Liquidado'); } };

          return (
            <div className="space-y-6 animate-fade-in pb-10">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <h2 className="text-3xl font-black">Centro de Reservas</h2>
                <button onClick={exportCSV} className="bg-emerald-600 text-white px-4 py-2 rounded-xl font-bold flex gap-2 items-center"><FileSpreadsheet className="w-4 h-4"/> Descargar a Excel</button>
              </div>
              <form onSubmit={handleSave} className="bg-white p-4 md:p-6 rounded-2xl border shadow-sm grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" placeholder="Nombre" required className="p-2.5 border rounded-xl md:col-span-2 outline-none focus:border-emerald-500" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
                <input type="tel" placeholder="Teléfono" className="p-2.5 border rounded-xl outline-none focus:border-emerald-500" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})}/>
                <input type="date" required className="p-2.5 border rounded-xl outline-none focus:border-emerald-500" value={form.date} onChange={e=>setForm({...form,date:e.target.value,isWknd:[0,5,6].includes(new Date(e.target.value+'T12:00:00').getDay())})}/>
                <label className="flex items-center justify-center gap-2 p-2.5 border rounded-xl bg-slate-50 cursor-pointer font-bold"><input type="checkbox" className="w-4 h-4 text-emerald-600" checked={form.depto} onChange={e=>setForm({...form,depto:e.target.checked})}/> + Depto</label>
                <input type="number" placeholder="Desc %" className="p-2.5 border rounded-xl outline-none focus:border-blue-500" value={form.disc||''} onChange={e=>setForm({...form,disc:e.target.value})}/>
                <div className="relative"><input type="number" placeholder="Anticipo $" required className="w-full p-2.5 border rounded-xl bg-emerald-50 outline-none focus:border-emerald-500 font-bold" value={form.ant} onChange={e=>setForm({...form,ant:e.target.value})}/><p className="text-[10px] text-slate-500 absolute -bottom-4 font-bold">Total: ${calcTotal}</p></div>
                <button className="bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-xl py-2.5 md:col-span-4 mt-2 md:mt-0 transition-colors">Guardar Reserva</button>
              </form>
              <div className="bg-white rounded-3xl shadow-sm border overflow-x-auto">
                <table className="w-full text-sm text-left min-w-[700px]">
                  <thead className="bg-slate-50 text-xs text-slate-400"><tr><th className="p-4">Fecha</th><th className="p-4">Cliente</th><th className="p-4">Total/Anticipo</th><th className="p-4">Estado</th><th className="p-4 text-right">Acción</th></tr></thead>
                  <tbody className="divide-y">{bookings.map(b=><tr key={b.id} className="hover:bg-slate-50"><td className="p-4 font-bold">{b._fechaStr}</td><td className="p-4">{b._nombreStr}<br/><span className="text-[10px] text-slate-400">{b._telefonoStr}</span></td><td className="p-4">${b._precioTotal} / <span className="text-emerald-600 font-bold">${b._anticipo}</span><br/><span className="text-[9px] bg-slate-100 px-1 rounded">{b.depto_incluido?'+ Depto':'Solo Salón'}</span></td><td className="p-4"><span className={`px-2 py-1 rounded text-[10px] font-bold uppercase ${b._status==='Liquidado'?'bg-emerald-100 text-emerald-700':b._status==='Anticipado'?'bg-blue-100 text-blue-700':'bg-amber-100 text-amber-700'}`}>{b._status}</span></td><td className="p-4 text-right flex flex-col items-end gap-1"><button onClick={()=>setEditB({...b,cliente_nombre:b._nombreStr,cliente_telefono:b._telefonoStr,cliente_correo:b._correoStr,precio_total:b._precioTotal,anticipo:b._anticipo,depto_incluido:b.depto_incluido||false})} className="text-xs bg-slate-100 px-3 py-1 rounded font-bold hover:bg-slate-200">Editar</button>{b._status==='Anticipado'&&<button onClick={()=>liq(b)} className="text-xs bg-emerald-100 text-emerald-700 px-3 py-1 rounded font-bold hover:bg-emerald-200">Liquidar</button>}<button onClick={()=>del(b.id)} className="text-[10px] text-rose-400 underline hover:text-rose-600 mt-1">Liberar</button></td></tr>)}</tbody>
                </table>
              </div>
              {editB && (
                <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4 animate-fade-in"><div className="bg-white p-6 rounded-3xl w-full max-w-md"><h3 className="font-bold text-xl mb-4 text-slate-800">Editar {editB._fechaStr}</h3>
                  <form onSubmit={handleUpdate} className="space-y-4">
                    <input type="text" className="w-full p-3 border rounded-xl outline-none" value={editB.cliente_nombre} onChange={e=>setEditB({...editB,cliente_nombre:e.target.value})} placeholder="Nombre"/>
                    <div className="flex gap-2"><input type="tel" className="flex-1 p-3 border rounded-xl outline-none" placeholder="Teléfono" value={editB.cliente_telefono} onChange={e=>setEditB({...editB,cliente_telefono:e.target.value})}/><input type="email" className="flex-1 p-3 border rounded-xl outline-none" placeholder="Correo" value={editB.cliente_correo} onChange={e=>setEditB({...editB,cliente_correo:e.target.value})}/></div>
                    <div className="flex gap-2"><input type="number" className="flex-1 p-3 border rounded-xl outline-none font-bold" placeholder="Total" value={editB.precio_total} onChange={e=>setEditB({...editB,precio_total:e.target.value})}/><input type="number" className="flex-1 p-3 border rounded-xl bg-emerald-50 outline-none text-emerald-700 font-bold" placeholder="Anticipo" value={editB.anticipo} onChange={e=>setEditB({...editB,anticipo:e.target.value})}/></div>
                    <label className="flex items-center gap-2 text-sm font-bold text-slate-600"><input type="checkbox" className="w-4 h-4 text-emerald-600" checked={editB.depto_incluido} onChange={e=>{const p=e.target.checked; const a=editB.precio_total; setEditB({...editB,depto_incluido:p, precio_total: p ? Number(a)+2000 : Number(a)-2000});}}/> + Departamento</label>
                    <div className="flex gap-2 pt-2"><button type="button" onClick={()=>setEditB(null)} className="flex-1 bg-slate-100 py-3 rounded-xl font-bold hover:bg-slate-200">Cancelar</button><button type="submit" className="flex-1 bg-slate-900 text-white py-3 rounded-xl font-bold hover:bg-slate-800">Guardar Cambios</button></div>
                  </form>
                </div></div>
              )}
            </div>
          );
        }

        function ExpensesModule({ db, expenses, cats, prof, showToast, callAI }) {
          const [f, setF] = useState({ date:new Date().toISOString().split('T')[0], cat:'', amt:'', desc:'', st:'Pagado', n:'' });
          const [eId, setEId] = useState(null); const [ai, setAi] = useState(''); const [ld, setLd] = useState(false); const [showCat, setShowCat] = useState(false); const [nc, setNc] = useState('');
          useEffect(()=>{if(!f.cat && cats[0]) setF(prev=>({...prev, cat:cats[0].name}))},[cats]);

          const exCSV = () => { const csv = ['Fecha,Descripción,Categoría,Estado,Monto,Observaciones'].concat(expenses.map(e=>`${e._fechaStr},"${e._desc}",${e._cat},${e._status},${e._monto},"${e.notes||''}"`)).join('\n'); const l=document.createElement('a'); l.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'})); l.download=`CasaCopal_Gastos_${new Date().toISOString().split('T')[0]}.csv`; l.click(); };
          const save = async(e) => { e.preventDefault(); try{ if(eId){ await updateDoc(doc(db,'gastos',eId), {date:f.date, category:f.cat, amount:Number(f.amt), description:f.desc, status:f.st, notes:f.n}); setEId(null); }else{ await addDoc(collection(db,'gastos'), {date:f.date, category:f.cat, amount:Number(f.amt), description:f.desc, status:f.st, notes:f.n, recordedBy:prof.name}); } showToast('Guardado exitosamente'); setF({date:new Date().toISOString().split('T')[0], cat:cats[0]?.name||'', amt:'', desc:'', st:'Pagado', n:''}); }catch(err){showToast('Error al guardar','error')} };
          const edit = (e) => { setEId(e.id); setF({date:e._fechaStr||e.date, cat:e._cat||e.category, amt:String(e._monto||e.amount||0), desc:e._desc||e.description, st:e._status||e.status, n:e.notes||''}); window.scrollTo({top:0, behavior:'smooth'}); };
          const parseAI = async() => { if(!ai) return; setLd(true); try{ const r = await callAI(`Extrae {"monto":numero, "descripcion":"texto", "categoria":"${cats.map(c=>c.name).join(',')}"} de: "${ai}"`, true); if(r.monto) { setF(p=>({...p, amt:r.monto, desc:r.descripcion||p.desc, cat:r.categoria||p.cat})); showToast('Formulario llenado mágicamente'); } }catch(err){showToast('Error IA','error')} setLd(false); };
          const addCat = async() => { if(!nc)return; await addDoc(collection(db,'categorias_gastos'),{name:nc}); setNc(''); };

          return (
            <div className="space-y-6 animate-fade-in pb-10 relative">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4"><h2 className="text-3xl font-black">Gastos Operativos</h2><button onClick={exCSV} className="bg-emerald-600 text-white px-4 py-2 rounded-xl font-bold flex gap-2 items-center"><FileSpreadsheet className="w-4 h-4"/> Descargar a Excel</button></div>
              <div className="bg-gradient-to-r from-indigo-50 to-purple-50 p-4 md:p-6 rounded-2xl border border-indigo-100 flex flex-col md:flex-row gap-4 items-center"><div className="flex gap-2 items-center"><Sparkles className="w-8 h-8 text-indigo-500 shrink-0 bg-white p-1.5 rounded-full shadow-sm"/><span className="text-sm font-bold text-indigo-900 md:hidden">Registro Mágico</span></div><input type="text" placeholder='Ej. "Compré 3 trapeadores en soriana por 250 pesos"' className="flex-1 w-full p-3 bg-white border border-indigo-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-400" value={ai} onChange={e=>setAi(e.target.value)} onKeyDown={e=>e.key==='Enter'&&parseAI()}/><button onClick={parseAI} disabled={ld} className="w-full md:w-auto bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold shadow-md hover:bg-indigo-700">{ld?'Pensando...':'Autocompletar'}</button></div>
              <form onSubmit={save} className="bg-white p-4 md:p-6 rounded-2xl border shadow-sm grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div><label className="flex justify-between text-xs font-bold text-slate-500 mb-1">Categoría <button type="button" onClick={()=>setShowCat(true)} className="text-emerald-600"><Settings className="w-3 h-3 inline"/> Admin</button></label><select className="w-full p-2.5 border rounded-xl outline-none" required value={f.cat} onChange={e=>setF({...f,cat:e.target.value})}>{cats.map(c=><option key={c.id}>{c.name}</option>)}</select></div>
                <div><label className="block text-xs font-bold text-slate-500 mb-1">Monto ($)</label><input type="number" placeholder="Monto" className="w-full p-2.5 border rounded-xl font-bold text-rose-600 outline-none" required value={f.amt} onChange={e=>setF({...f,amt:e.target.value})}/></div>
                <div><label className="block text-xs font-bold text-slate-500 mb-1">Descripción</label><input type="text" placeholder="Ej. Pintura blanca" className="w-full p-2.5 border rounded-xl outline-none" required value={f.desc} onChange={e=>setF({...f,desc:e.target.value})}/></div>
                <div><label className="block text-xs font-bold text-slate-500 mb-1">Estado</label><select className="w-full p-2.5 border rounded-xl outline-none" value={f.st} onChange={e=>setF({...f,st:e.target.value})}><option>Pagado</option><option>Adeudo</option></select></div>
                <div className="md:col-span-3"><label className="block text-xs font-bold text-slate-500 mb-1">Observaciones</label><input type="text" placeholder="Factura pendiente..." className="w-full p-2.5 border rounded-xl outline-none" value={f.n} onChange={e=>setF({...f,n:e.target.value})}/></div>
                <div className="flex gap-2 md:col-span-1">{eId&&<button type="button" onClick={()=>{setEId(null); setF({date:'',cat:cats[0]?.name,amt:'',desc:'',st:'Pagado',n:''});}} className="bg-slate-200 text-slate-600 px-4 py-2.5 rounded-xl font-bold">X</button>}<button className="bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-xl flex-1 py-2.5">{eId?'Actualizar':'Guardar'}</button></div>
              </form>
              <div className="bg-white rounded-3xl shadow-sm border overflow-x-auto"><table className="w-full text-sm text-left min-w-[700px]"><thead className="bg-slate-50 text-xs text-slate-500 uppercase"><tr><th className="p-4 text-center">Acción</th><th className="p-4">Fecha</th><th className="p-4">Descripción</th><th className="p-4 text-center">Estado</th><th className="p-4 text-right">Monto</th></tr></thead>
              <tbody className="divide-y">{expenses.map(e=><tr key={e.id} className="hover:bg-slate-50"><td className="p-4 text-center"><button onClick={()=>edit(e)} className="bg-slate-100 p-2 rounded-full hover:bg-blue-100 text-slate-600 mr-2"><i className="fa-solid fa-pen text-xs"></i></button><button onClick={()=>{if(window.confirm('¿Borrar?'))deleteDoc(doc(db,'gastos',e.id))}} className="bg-slate-100 p-2 rounded-full hover:bg-rose-100 text-slate-600"><i className="fa-solid fa-trash text-xs"></i></button></td><td className="p-4 font-bold">{e._fechaStr}</td><td className="p-4">{e._desc}<br/><span className="text-[10px] text-slate-400 uppercase">{e._cat} • Por: {e.recordedBy}</span></td><td className="p-4 text-center"><span className={`text-[10px] font-bold px-2 py-1 rounded uppercase ${e._status==='Adeudo'?'bg-amber-100 text-amber-700':'bg-emerald-100 text-emerald-700'}`}>{e._status}</span></td><td className="p-4 font-black text-rose-600 text-right">-${e._monto.toLocaleString()}</td></tr>)}</tbody></table></div>
              {showCat && (
                <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4"><div className="bg-white p-6 rounded-3xl w-full max-w-sm"><h3 className="font-bold text-xl mb-4">Categorías</h3><div className="flex gap-2 mb-4"><input className="flex-1 border p-2 rounded-lg outline-none" value={nc} onChange={e=>setNc(e.target.value)} placeholder="Nueva..."/><button onClick={addCat} className="bg-emerald-600 text-white px-4 rounded-lg font-bold">+</button></div><div className="max-h-48 overflow-auto border rounded-lg">{cats.map(c=><div key={c.id} className="p-2 border-b flex justify-between"><span>{c.name}</span><button onClick={()=>deleteDoc(doc(db,'categorias_gastos',c.id))} className="text-rose-500 text-xs"><i className="fa-solid fa-trash"></i></button></div>)}</div><button onClick={()=>setShowCat(false)} className="w-full mt-4 bg-slate-100 py-2 rounded-lg font-bold">Cerrar</button></div></div>
              )}
            </div>
          );
        }

        function QuotesModule({ db, quotes, showToast, onConv }) {
          const [f, setF] = useState({ name:'', phone:'', email:'', date:'', type:'', guests:'50', depto:false, disc:0 });
          const save = async(e)=>{ e.preventDefault(); try{ await addDoc(collection(db,'cotizaciones'), {cliente_nombre:f.name, cliente_telefono:f.phone, cliente_correo:f.email, date:f.date, depto_incluido:f.depto, descuento_aplicado:f.disc, timestamp:Date.now()}); showToast('Guardada'); }catch(e){} };
          return (
            <div className="space-y-6 pb-10"><h2 className="text-3xl font-black">Cotizaciones CRM</h2>
              <form onSubmit={save} className="bg-white p-4 md:p-6 border rounded-2xl shadow-sm grid grid-cols-1 md:grid-cols-2 gap-4"><input required placeholder="Nombre del Prospecto" className="p-3 border rounded-xl outline-none" value={f.name} onChange={e=>setF({...f,name:e.target.value})}/><input type="date" required className="p-3 border rounded-xl outline-none" value={f.date} onChange={e=>setF({...f,date:e.target.value})}/><button className="md:col-span-2 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold transition-colors">Guardar Cotización Básica</button></form>
              <div className="bg-white p-4 border rounded-2xl shadow-sm">{quotes.map(q=><div key={q.id} className="flex flex-col md:flex-row justify-between p-3 border-b border-slate-100 gap-3 items-start md:items-center"><span className="font-bold text-slate-800">{q.cliente_nombre} <span className="font-normal text-slate-500 text-xs ml-2 bg-slate-100 px-2 py-1 rounded">{q.date}</span></span><button onClick={()=>onConv(q)} className="text-xs bg-emerald-100 text-emerald-700 px-4 py-2 rounded-lg font-bold hover:bg-emerald-200"><i className="fa-solid fa-bolt mr-1"></i> A Reserva</button></div>)}</div>
            </div>
          );
        }

        function ClientsModule({ clients, notes, db }) {
          return (
            <div className="space-y-6 pb-10"><h2 className="text-3xl font-black">Directorio VIP</h2><div className="grid grid-cols-1 md:grid-cols-3 gap-4">{clients.map(c=><div key={c.id} className="bg-white p-6 border border-slate-200 shadow-sm rounded-2xl"><h3 className="font-black text-lg text-slate-800">{c.name}</h3><a href={`https://wa.me/52${c.phone.replace(/\D/g,'')}`} target="_blank" className="text-sm text-emerald-600 font-bold mb-3 inline-block"><i className="fa-brands fa-whatsapp"></i> {c.phone}</a><div className="bg-slate-50 p-3 rounded-xl text-xs flex justify-between font-bold text-slate-600 border border-slate-100"><span>Eventos: {c.totalBookings}</span><span className="text-emerald-700">Inv: ${c.totalSpent.toLocaleString()}</span></div><p className="mt-3 text-xs italic bg-amber-50 border border-amber-100 p-3 rounded-lg text-slate-600">{notes[c.id]||'Sin notas u observaciones.'}</p></div>)}</div></div>
          );
        }

        function MarketingHub({ copy, showToast, callAI }) {
          const [topic, setTopic] = useState(''); const [post, setPost] = useState(''); const [ld, setLd] = useState(false);
          const [contractData, setContractData] = useState({ client: '', date: '', type: '', startTime: '', endTime: '', salon: '', depto: '', discount: '', deposit: '' });
          const [generatedContract, setGeneratedContract] = useState('');
          const [lockCode, setLockCode] = useState('');
          const [generatedManual, setGeneratedManual] = useState('');
          const [manualIncludesDepto, setManualIncludesDepto] = useState(false);
          const [copiedContract, setCopiedContract] = useState(false);
          const [copiedManual, setCopiedManual] = useState(false);

          const gen = async()=>{ setLd(true); try{ setPost(await callAI(`Crea un post persuasivo de Facebook para Casa Copal sobre: ${topic}`)); }catch(e){showToast('Error IA','error')} setLd(false); };
          const dl = async(id, name) => { const el = document.getElementById(id); if(!el||!window.html2canvas) return; const cv = await window.html2canvas(el, {scale:3, useCORS:true}); const a = document.createElement('a'); a.download=name; a.href=cv.toDataURL(); a.click(); };
          
          const generateContract = () => {
            const subtotal = (Number(contractData.salon) || 0) + (Number(contractData.depto) || 0);
            const total = subtotal - (subtotal * ((Number(contractData.discount) || 0) / 100));
            const balance = total - (Number(contractData.deposit) || 0);
            const today = new Date(); const todayStr = `${today.getDate()}/${today.getMonth()+1}/${today.getFullYear()}`;
            const text = `*CONTRATO CASA COPAL* 🌿\nFECHA: ${todayStr}\n\n*1. PARTES*\nCliente: ${contractData.client || '[Nombre]'}\n\n*2. EVENTO*\nFecha: ${contractData.date || '[Fecha]'}\nHorario: ${contractData.startTime || '[Inicio]'} a ${contractData.endTime || '[Fin]'} hrs.\nTipo: ${contractData.type || '[Tipo]'}\nInvitados: 50 max.\n\n*3. FINANZAS*\n*TOTAL:* $${total.toLocaleString()} MXN\nAnticipo: $${(Number(contractData.deposit)||0).toLocaleString()} MXN\n*SALDO:* $${balance.toLocaleString()} MXN (Liquidar 1 día antes).\n*GARANTÍA:* $1,500 MXN (Reembolsable).\n\n*4. REGLAS*\nNo ruido excesivo, no vidrio en alberca, no confeti metálico, dejar basura en su lugar.\n\nResponde *"Acepto términos y condiciones"* para confirmar.`;
            setGeneratedContract(text);
          };

          useEffect(() => {
            const code = lockCode.trim() || '[CÓDIGO]';
            const deptoText = manualIncludesDepto ? `\n🏡 ACCESO AL DEPARTAMENTO\nMisma clave del salón.\n` : '';
            setGeneratedManual(`🌿 ¡BIENVENIDOS A CASA COPAL! 🌿\n\n🔓 1. ACCESO DIGITAL\nCódigo: *${code}*\n(Toca la pantalla y presiona #).${deptoText}\n📶 2. WI-FI\nRed: MERCUSYS_2FB4 | Pass: 83763557\n\n📹 3. CHECK-IN\nEnvíanos un video rápido al llegar mostrando todo en orden.\n\n🛑 4. TIPS\nApaga la música a tu hora. No vidrio en alberca.\n\n📸 5. CHECK-OUT\nEnvíanos 2 fotos al salir: asador apagado y refri vacío.\n\n¡Que lo disfruten! 🥳`);
          }, [lockCode, manualIncludesDepto]);

          return (
            <div className="space-y-6 pb-20"><h2 className="text-3xl font-black">Hub de Ventas</h2>
              
              <div className="bg-gradient-to-r from-fuchsia-50 to-pink-50 p-4 md:p-6 rounded-3xl shadow-sm border border-fuchsia-100 flex flex-col md:flex-row gap-4 items-center">
                <div className="w-12 h-12 bg-white rounded-xl flex items-center justify-center shrink-0"><Sparkles className="text-fuchsia-500 w-6 h-6" /></div>
                <div className="flex-1 w-full"><h3 className="font-bold text-fuchsia-900 mb-2">Redactor Mágico para Redes</h3><div className="flex gap-2"><input className="flex-1 p-3 bg-white rounded-xl border outline-none text-sm" placeholder="Ej. Promoción de mayo..." value={topic} onChange={e=>setTopic(e.target.value)} onKeyDown={e=>e.key==='Enter'&&gen()}/><button onClick={gen} disabled={ld} className="bg-fuchsia-600 text-white font-bold px-4 rounded-xl">{ld?'...':'Generar'}</button></div></div>
              </div>
              {post && <div className="bg-white p-4 rounded-2xl relative shadow-sm border"><button onClick={()=>{copy(post); setCopiedPost(true); setTimeout(()=>setCopiedPost(false),2000);}} className="absolute top-3 right-3 text-xs bg-fuchsia-100 text-fuchsia-700 px-3 py-1.5 rounded-lg font-bold">{copiedPost ? '¡Copiado!' : 'Copiar Texto'}</button><pre className="font-sans text-sm whitespace-pre-wrap mt-2 pr-20">{post}</pre></div>}

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div className="bg-white p-6 rounded-3xl border shadow-sm h-fit">
                  <h3 className="font-black text-slate-800 text-lg mb-4">Generador de Contratos Móvil</h3>
                  <div className="space-y-4">
                    <input type="text" className="w-full p-2.5 border rounded-lg bg-slate-50 text-sm outline-none" placeholder="Nombre Cliente" value={contractData.client} onChange={e=>setContractData({...contractData, client: e.target.value})}/>
                    <div className="grid grid-cols-2 gap-4"><input type="date" className="w-full p-2.5 border rounded-lg bg-slate-50 text-sm outline-none" value={contractData.date} onChange={e=>setContractData({...contractData, date: e.target.value})}/><input type="text" className="w-full p-2.5 border rounded-lg bg-slate-50 text-sm outline-none" placeholder="Tipo Evento" value={contractData.type} onChange={e=>setContractData({...contractData, type: e.target.value})}/></div>
                    <div className="grid grid-cols-2 gap-4"><input type="time" className="w-full p-2.5 border rounded-lg bg-slate-50 text-sm outline-none" value={contractData.startTime} onChange={e=>setContractData({...contractData, startTime: e.target.value})}/><input type="time" className="w-full p-2.5 border rounded-lg bg-slate-50 text-sm outline-none" value={contractData.endTime} onChange={e=>setContractData({...contractData, endTime: e.target.value})}/></div>
                    <div className="grid grid-cols-2 gap-4"><input type="number" placeholder="Costo Salón" className="w-full p-2.5 border rounded-lg bg-slate-50 text-sm outline-none" value={contractData.salon} onChange={e=>setContractData({...contractData, salon: e.target.value})}/><input type="number" placeholder="Costo Depto" className="w-full p-2.5 border rounded-lg bg-slate-50 text-sm outline-none" value={contractData.depto} onChange={e=>setContractData({...contractData, depto: e.target.value})}/></div>
                    <div className="grid grid-cols-2 gap-4"><input type="number" placeholder="Desc %" className="w-full p-2.5 border rounded-lg bg-blue-50 text-blue-700 text-sm font-bold outline-none" value={contractData.discount} onChange={e=>setContractData({...contractData, discount: e.target.value})}/><input type="number" placeholder="Anticipo $" className="w-full p-2.5 border rounded-lg bg-emerald-50 text-emerald-700 text-sm font-bold outline-none" value={contractData.deposit} onChange={e=>setContractData({...contractData, deposit: e.target.value})}/></div>
                    <button onClick={generateContract} className="w-full bg-slate-900 text-white font-bold py-3 mt-2 rounded-xl">Generar</button>
                  </div>
                </div>

                <div className="space-y-6">
                  <div className="bg-white p-2 rounded-3xl border shadow-sm overflow-hidden">
                    <div className="flex justify-between items-center p-2 px-4"><label className="font-bold text-sm">Contrato</label><button onClick={()=>{copy(generatedContract); setCopiedContract(true); setTimeout(()=>setCopiedContract(false),2000);}} className="text-xs bg-emerald-600 text-white px-3 py-1.5 rounded-lg">{copiedContract?'Copiado':'Copiar'}</button></div>
                    <textarea readOnly value={generatedContract} className="w-full h-[200px] p-4 bg-slate-50 text-[12px] font-mono resize-none outline-none rounded-b-2xl"></textarea>
                  </div>
                  <div className="bg-white p-6 rounded-3xl border shadow-sm border-l-4 border-l-emerald-500">
                    <h3 className="font-bold text-emerald-800 mb-2 uppercase text-xs">Manual Bienvenida</h3>
                    <div className="flex gap-2 mb-3"><input type="text" className="flex-1 p-2 border rounded-lg bg-slate-50 text-sm outline-none" placeholder="Código (Ej. 1234)" value={lockCode} onChange={e=>setLockCode(e.target.value)} /><label className="flex items-center gap-1 font-bold text-xs"><input type="checkbox" className="w-4 h-4" checked={manualIncludesDepto} onChange={e=>setManualIncludesDepto(e.target.checked)}/> + Depto</label></div>
                    <div className="flex justify-between items-center mb-1"><label className="text-[10px] font-bold uppercase text-slate-400">Vista Previa</label><button onClick={()=>{copy(generatedManual); setCopiedManual(true); setTimeout(()=>setCopiedManual(false),2000);}} className="text-[10px] font-bold bg-emerald-100 text-emerald-800 px-3 py-1 rounded-md">{copiedManual?'Copiado':'Copiar'}</button></div>
                    <textarea readOnly value={generatedManual} className="w-full h-[150px] p-3 bg-slate-50 text-[11px] font-mono resize-none outline-none rounded-xl"></textarea>
                  </div>
                </div>
              </div>

              <div className="mt-8 border-t border-slate-200 pt-8">
                <h3 className="font-black text-xl mb-6">Folletos Digitales Originales</h3>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                  <div className="bg-white p-6 rounded-3xl border shadow-sm text-center">
                    <div id="f-salon" className="bg-white w-[300px] sm:w-[380px] mx-auto shadow-xl rounded-2xl overflow-hidden pb-4" style={{fontFamily:"'Montserrat',sans-serif"}}>
                       <img src={"https://" + "i.postimg.cc/Xq68hKSx/foto_1.png"} crossOrigin="anonymous" className="w-full h-[150px] sm:h-[190px] object-cover" />
                       <h1 className="text-3xl sm:text-4xl font-black mt-4">CASA COPAL</h1><p className="text-emerald-600 text-[9px] sm:text-[10px] font-bold tracking-widest uppercase">Tu evento perfecto</p>
                       <div className="px-6 text-xs sm:text-sm mt-4 text-left font-medium space-y-1"><p>✔️ Paquete de 7 horas.</p><p>✔️ Mobiliario para 50.</p><p>✔️ Excelente sombra.</p><p>✔️ Cocina asador, estufa, hielera.</p></div><p className="text-[9px] sm:text-[10px] mt-4 font-bold">624 320 3289 | {"www."+"casacopal.com.mx"}</p>
                    </div>
                    <button onClick={()=>dl('f-salon','Salon.png')} className="mt-4 bg-emerald-600 text-white px-6 py-2.5 rounded-xl font-bold w-full sm:w-auto shadow-md hover:bg-emerald-700">Descargar Salón</button>
                  </div>
                  <div className="bg-white p-6 rounded-3xl border shadow-sm text-center">
                    <div id="f-depto" className="bg-white w-[300px] sm:w-[380px] mx-auto shadow-xl rounded-2xl overflow-hidden pt-8 pb-4" style={{fontFamily:"'Montserrat',sans-serif"}}>
                       <h1 className="text-2xl sm:text-3xl font-black">DEPARTAMENTO<br/><span className="text-emerald-600">PRIVADO</span></h1>
                       <img src={"https://" + "i.postimg.cc/K4XQyFBj/20260201-232054000-i-OS.jpg"} crossOrigin="anonymous" className="w-[80%] mx-auto h-[120px] sm:h-[160px] object-cover rounded-2xl mt-4 shadow-sm" />
                       <div className="px-6 text-[10px] sm:text-xs mt-6 font-bold text-slate-600 flex justify-between bg-slate-50 p-3 mx-4 rounded-xl border"><p>Lun a Jueves<br/><span className="text-sm font-black text-slate-800">+$1,600</span></p><p className="text-emerald-700">Viernes a Dom<br/><span className="text-sm font-black">+$2,000</span></p></div><p className="text-[9px] sm:text-[10px] mt-4 font-bold">624 320 3289 | {"www."+"casacopal.com.mx"}</p>
                    </div>
                    <button onClick={()=>dl('f-depto','Depto.png')} className="mt-4 bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold w-full sm:w-auto shadow-md hover:bg-blue-700">Descargar Depto</button>
                  </div>
                </div>
              </div>

            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<CasaCopalAdmin />);
    </script>
</body>
</html>
