                              {status !== 'Liquidado' && <p className="text-xs text-rose-500 font-bold border-t border-slate-200 pt-1 mt-1">Saldo: ${saldo.toLocaleString()}</p>}
                            </div>
                          </td>
                          <td className="p-6 align-top text-right">
                            <div className="flex flex-col items-end gap-2">
                              {status === 'Liquidado' ? (
                                <span className="text-[10px] text-slate-400 font-bold"><i className="fa-solid fa-lock"></i> Pago Completo</span>
                              ) : status === 'Anticipado' ? (
                                <button onClick={() => setBookingToLiquidate(b)} className="bg-emerald-600 text-white text-xs font-bold px-4 py-2 rounded-full hover:bg-emerald-700 transition-colors shadow-md flex items-center gap-1.5"><i className="fa-solid fa-hand-holding-dollar"></i> Liquidar Saldo</button>
                              ) : (
                                <button onClick={() => handleApproveWebBooking(b.id)} className="bg-slate-900 text-white text-xs font-bold px-4 py-2 rounded-full hover:bg-emerald-600 transition-colors shadow-md flex items-center gap-1.5"><i className="fa-solid fa-check"></i> Aprobar</button>
                              )}
                              {(status === 'Anticipado' || status === 'Pendiente') && (
                                <button onClick={() => setBookingToFree(b)} className="text-[10px] text-rose-400 hover:text-rose-600 font-bold hover:underline transition-colors mt-2">Liberar Fecha</button>
                              )}
                            </div>
                          </td>
                        </tr>
                      )})}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* Modales Reserva */}
              {editingBooking && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-fade-in">
                  <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">
                    <div className="bg-slate-50 p-6 border-b border-slate-100 flex justify-between items-center">
                      <div><h3 className="font-black text-xl text-slate-800">Editar Reserva</h3><p className="text-xs text-slate-500 mt-1 font-bold">Fecha: {editingBooking.date || 'Sin asignar'}</p></div>
                      <button onClick={() => setEditingBooking(null)} className="w-8 h-8 flex items-center justify-center bg-white rounded-full text-slate-400 hover:text-slate-800 hover:bg-slate-200 transition-colors shadow-sm"><i className="fa-solid fa-xmark"></i></button>
                    </div>
                    <form onSubmit={handleUpdateBooking} className="p-6 space-y-4">
                      <div><label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Nombre del Cliente</label><input type="text" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-emerald-500 font-bold text-slate-700" value={editingBooking.cliente_nombre} onChange={e => setEditingBooking({...editingBooking, cliente_nombre: e.target.value})} required/></div>
                      <div className="grid grid-cols-2 gap-4">
                        <div><label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Teléfono</label><input type="tel" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-emerald-500 font-bold text-slate-700" value={editingBooking.cliente_telefono} onChange={e => setEditingBooking({...editingBooking, cliente_telefono: e.target.value})} /></div>
                        <div><label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Correo (Opcional)</label><input type="email" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-emerald-500 font-bold text-slate-700" value={editingBooking.cliente_correo || ''} onChange={e => setEditingBooking({...editingBooking, cliente_correo: e.target.value})} /></div>
                      </div>
                      <div className="grid grid-cols-2 gap-4">
                        <div><label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Importe Total ($)</label><input type="number" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-emerald-500 font-black text-slate-800" value={editingBooking.precio_total} onChange={e => setEditingBooking({...editingBooking, precio_total: e.target.value})} required/></div>
                        <div><label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Anticipo ($)</label><input type="number" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-emerald-500 font-black text-emerald-600" value={editingBooking.anticipo || 0} onChange={e => setEditingBooking({...editingBooking, anticipo: e.target.value})} required/></div>
                      </div>
                      <div className="flex items-center gap-2"><label className="flex items-center gap-2 text-xs font-bold text-slate-600 cursor-pointer"><input type="checkbox" className="w-4 h-4 text-emerald-600 rounded" checked={editingBooking.depto_incluido || false} onChange={handleEditDeptoToggle} /> Incluye Departamento</label></div>
                      <button type="submit" className="w-full bg-slate-900 text-white font-bold py-3.5 rounded-xl mt-4 hover:bg-emerald-600 transition-colors shadow-lg flex justify-center items-center gap-2">Guardar Cambios</button>
                    </form>
                  </div>
                </div>
              )}
              {bookingToLiquidate && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-fade-in">
                  <div className="bg-white p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl">
                    <h3 className="text-xl font-black text-slate-800 mb-2">¿Liquidar Evento?</h3>
                    <p className="text-slate-500 text-sm mb-6">El anticipo se igualará al precio total del evento y se registrará como <strong className="text-emerald-700">Liquidado</strong>.</p>
                    <div className="flex gap-3"><button onClick={() => setBookingToLiquidate(null)} className="flex-1 py-3 bg-slate-100 text-slate-600 font-bold hover:bg-slate-200 rounded-xl">Cancelar</button><button onClick={confirmLiquidar} className="flex-1 py-3 bg-emerald-600 text-white font-bold hover:bg-emerald-700 rounded-xl">Sí, liquidar</button></div>
                  </div>
                </div>
              )}
              {bookingToFree && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-fade-in">
                  <div className="bg-white p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl">
                    <h3 className="text-xl font-black text-slate-800 mb-2">¿Liberar Fecha?</h3>
                    <p className="text-slate-500 text-sm mb-6">Se eliminará la reserva. El día volverá a estar disponible en la web.</p>
                    <div className="flex gap-3"><button onClick={() => setBookingToFree(null)} className="flex-1 py-3 bg-slate-100 text-slate-600 font-bold hover:bg-slate-200 rounded-xl">Cancelar</button><button onClick={confirmFreeDate} className="flex-1 py-3 bg-rose-600 text-white font-bold hover:bg-rose-700 rounded-xl">Sí, liberar</button></div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        function ExpensesModule({ db, expenses, expenseCategories, activeProfile, showToast, callGeminiAI }) {
          const [form, setForm] = useState({ date: new Date().toISOString().split('T')[0], category: '', amount: '', description: '', status: 'Pagado', notes: '' });
          const [editingExpense, setEditingExpense] = useState(null);
          const [showCatModal, setShowCatModal] = useState(false);
          const [newCatName, setNewCatName] = useState('');
          const [aiPrompt, setAiPrompt] = useState('');
          const [isAiLoading, setIsAiLoading] = useState(false);

          useEffect(() => { if (expenseCategories.length > 0 && !form.category) setForm(f => ({ ...f, category: expenseCategories[0].name })); }, [expenseCategories]);

          const handleExportExpensesToCSV = () => {
            if (expenses.length === 0) return showToast('No hay gastos para exportar', 'error');
            const csvContent = ['Fecha,Descripción,Categoría,Estado,Monto,Registrado Por,Observaciones'].concat(
              expenses.map(e => `${e._fechaStr},"${e._desc}",${e._cat},${e._status},${e._monto},"${e.recordedBy||''}","${e.notes||''}"`)
            ).join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `CasaCopal_Gastos_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
            showToast('Archivo de gastos descargado');
          };

          const handleSaveExpense = async (e) => {
            e.preventDefault();
            try {
              if (editingExpense) {
                await updateDoc(doc(db, 'gastos', editingExpense.id), { date: editingExpense.date, category: editingExpense.category, amount: Number(editingExpense.amount), description: editingExpense.description, status: editingExpense.status, notes: editingExpense.notes || '' });
                showToast('Gasto actualizado'); setEditingExpense(null);
              } else {
                await addDoc(collection(db, 'gastos'), { ...form, category: form.category || (expenseCategories[0]?.name || 'General'), amount: Number(form.amount), recordedBy: activeProfile.name, timestamp: Date.now() });
                showToast('Gasto registrado');
              }
              setForm({ date: new Date().toISOString().split('T')[0], category: expenseCategories[0]?.name || '', amount: '', description: '', status: 'Pagado', notes: '' });
              setAiPrompt('');
            } catch(err) { showToast('Error al guardar: ' + err.message, 'error'); }
          };

          const handleEdit = (expense) => {
            try {
              setEditingExpense({ id: expense.id, date: expense._fechaStr || expense.date || new Date().toISOString().split('T')[0], category: expense._cat || expense.category || '', amount: String(expense._monto ?? expense.amount ?? 0), description: expense._desc || expense.description || '', status: expense._status || expense.status || 'Pagado', notes: expense.notes || '' });
            } catch (err) { showToast("No se pudo abrir el gasto para edición", "error"); }
          };

          const handleDeleteExpense = async (id) => { if (window.confirm('¿Eliminar gasto de forma permanente?')) { try { await deleteDoc(doc(db, 'gastos', id)); showToast('Gasto eliminado exitosamente'); } catch (err) { showToast('Error al eliminar', 'error'); } } };
          const handleAddCategory = async () => { if (!newCatName.trim()) return; try { await addDoc(collection(db, 'categorias_gastos'), { name: newCatName.trim() }); setNewCatName(''); showToast('Categoría agregada'); } catch (err) { showToast('Error', 'error'); } };
          const handleDeleteCategory = async (id) => { if (window.confirm('¿Eliminar esta categoría?')) { try { await deleteDoc(doc(db, 'categorias_gastos', id)); showToast('Categoría eliminada'); } catch (err) { showToast('Error', 'error'); } } };

          const handleAIParse = async () => {
              if(!aiPrompt.trim()) return showToast('Escribe algo primero', 'error');
              setIsAiLoading(true);
              try {
                  const catList = expenseCategories.map(c => c.name).join(', ');
                  const result = await callGeminiAI(`Analiza este texto de un gasto de un salón de eventos y extrae los datos en formato JSON estricto con las claves: "monto" (solo números), "descripcion" (texto breve capitalizado), y "categoria" (debes elegir exactamente UNA de esta lista: ${catList}. Si ninguna cuadra usa "General"). Texto: "${aiPrompt}"`, true);
                  if(result && result.monto) { setForm(p => ({...p, amount: result.monto.toString(), description: result.descripcion || p.description, category: result.categoria || p.category})); showToast('✨ Formulario autocompletado'); }
              } catch (err) { showToast('IA: ' + (err.message || 'Error desconocido'), 'error'); } finally { setIsAiLoading(false); }
          };

          return (
            <div className="animate-fade-in space-y-6 relative">
              <div className="flex justify-between items-end">
                <div><h2 className="text-3xl font-black text-slate-800">Gastos Operativos</h2><p className="text-slate-500 font-medium">Solo los gastos <span className="text-emerald-600 font-bold">Pagados</span> se restarán de tus utilidades.</p></div>
                <button onClick={handleExportExpensesToCSV} className="bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-bold py-2 px-4 rounded-xl shadow-md transition-colors flex items-center gap-2"><FileSpreadsheet className="w-4 h-4"/> Descargar a Excel</button>
              </div>
              <div className="bg-gradient-to-r from-indigo-50 to-purple-50 p-6 rounded-2xl shadow-sm border border-indigo-100 flex flex-col md:flex-row gap-4 items-center">
                  <div className="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm shrink-0"><Sparkles className="text-indigo-500 w-6 h-6" /></div>
                  <div className="flex-1 w-full"><h4 className="text-sm font-bold text-indigo-900 mb-1">Registro Mágico</h4>
                      <div className="flex gap-2">
                          <input type="text" placeholder='Ej. "Compré cloro en Walmart por 500 pesos"' className="w-full p-3 bg-white border border-indigo-200 rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none text-sm text-slate-700" value={aiPrompt} onChange={(e) => setAiPrompt(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleAIParse()} />
                          <button onClick={handleAIParse} disabled={isAiLoading} className="bg-indigo-600 text-white font-bold px-6 rounded-xl hover:bg-indigo-700 transition-colors shrink-0 shadow-md disabled:opacity-50 flex items-center justify-center min-w-[150px]">{isAiLoading ? <Loader2 className="w-5 h-5 animate-spin mx-auto"/> : '✨ Autocompletar'}</button>
                      </div>
                  </div>
              </div>
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <form onSubmit={handleSaveExpense} className="space-y-4">
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                      <label className="flex justify-between items-center text-xs font-bold text-slate-500 mb-1">Categoría <button type="button" onClick={() => setShowCatModal(true)} className="text-emerald-600 hover:text-emerald-700 flex items-center gap-1"><Settings className="w-3 h-3"/> Administrar</button></label>
                      <select required className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-colors" value={form.category} onChange={e=>setForm({...form, category: e.target.value})}>{expenseCategories.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}</select>
                    </div>
                    <div><label className="block text-xs font-bold text-slate-500 mb-1">Monto ($)</label><input type="number" required min="1" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-colors" value={form.amount} onChange={e=>setForm({...form, amount: e.target.value})}/></div>
                    <div><label className="block text-xs font-bold text-slate-500 mb-1">Descripción</label><input type="text" required placeholder="Ej. Pintura blanca" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-colors" value={form.description} onChange={e=>setForm({...form, description: e.target.value})}/></div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                    <div><label className="block text-xs font-bold text-slate-500 mb-1">Estado</label><select className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-colors" value={form.status} onChange={e=>setForm({...form, status: e.target.value})}><option value="Pagado">Pagado</option><option value="Adeudo">Adeudo</option></select></div>
                    <div className="md:col-span-2"><label className="block text-xs font-bold text-slate-500 mb-1">Observaciones (Opcional)</label><input type="text" placeholder="Ej. Factura pendiente" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-colors" value={form.notes} onChange={e=>setForm({...form, notes: e.target.value})}/></div>
                    <div><button type="submit" className="w-full bg-slate-900 text-white font-bold py-2.5 px-4 rounded-lg hover:bg-slate-800 transition-colors shadow-md">Guardar Nuevo</button></div>
                  </div>
                </form>
              </div>
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <table className="w-full text-left">
                  <thead className="bg-slate-50 text-slate-500 text-xs uppercase font-bold border-b border-slate-200"><tr><th className="p-4 text-center w-24">Acciones</th><th className="p-4">Fecha</th><th className="p-4">Descripción</th><th className="p-4">Categoría</th><th className="p-4 text-center">Estado</th><th className="p-4 text-right">Monto</th><th className="p-4">Observaciones</th></tr></thead>
                  <tbody className="divide-y divide-slate-100">
                    {expenses.length === 0 ? ( <tr><td colSpan="7" className="p-8 text-center text-slate-400">Sin gastos registrados</td></tr>
                    ) : expenses.map(e => (
                      <tr key={e.id} className="hover:bg-slate-50">
                        <td className="p-4 text-center"><div className="flex items-center justify-center gap-2"><button type="button" onClick={() => handleEdit(e)} className="w-8 h-8 bg-slate-200 text-slate-700 hover:bg-blue-100 hover:text-blue-700 rounded-full flex items-center justify-center shadow-sm"><i className="fa-solid fa-pen text-sm"></i></button><button type="button" onClick={() => handleDeleteExpense(e.id)} className="w-8 h-8 bg-slate-200 text-slate-700 hover:bg-rose-100 hover:text-rose-700 rounded-full flex items-center justify-center shadow-sm"><i className="fa-solid fa-trash text-sm"></i></button></div></td>
                        <td className="p-4 text-sm font-bold">{e._fechaStr}</td>
                        <td className="p-4 font-medium text-slate-700">{e._desc} <span className="text-[9px] text-emerald-600 bg-emerald-50 ml-2 px-1 py-0.5 rounded border border-emerald-100">Por: {e.recordedBy || 'Admin'}</span></td>
                        <td className="p-4 text-xs font-bold uppercase text-slate-400">{e._cat}</td>
                        <td className="p-4 text-center"><span className={`text-[10px] font-bold px-2 py-1 rounded-md ${e._status === 'Adeudo' ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700'}`}>{e._status === 'Adeudo' ? 'ADEUDO' : 'PAGADO'}</span></td>
                        <td className="p-4 text-right font-black text-rose-600">-${Number(e._monto).toLocaleString()}</td>
                        <td className="p-4 text-xs text-slate-500 font-medium">{e.notes || '-'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              {/* Modal Edición de Gasto */}
              {editingExpense && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-fade-in">
                  <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden p-0">
                    <div className="bg-slate-50 p-6 border-b border-slate-100 flex justify-between items-center"><div><h3 className="font-black text-xl text-slate-800">Editar Gasto</h3></div><button type="button" onClick={() => setEditingExpense(null)} className="w-8 h-8 flex items-center justify-center bg-white rounded-full text-slate-400 hover:text-slate-800 hover:bg-slate-200 transition-colors shadow-sm"><i className="fa-solid fa-xmark"></i></button></div>
                    <form onSubmit={handleSaveExpense} className="p-6 space-y-4">
                      <div className="grid grid-cols-2 gap-4"><div><label className="block text-[10px] font-black text-slate-400 uppercase mb-1.5">Fecha</label><input type="date" className="w-full p-3 bg-slate-50 border rounded-xl outline-none" value={editingExpense.date} onChange={e => setEditingExpense({...editingExpense, date: e.target.value})} required/></div><div><label className="block text-[10px] font-black text-slate-400 uppercase mb-1.5">Categoría</label><select className="w-full p-3 bg-slate-50 border rounded-xl outline-none" value={editingExpense.category} onChange={e => setEditingExpense({...editingExpense, category: e.target.value})} required>{expenseCategories.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}</select></div></div>
                      <div className="grid grid-cols-2 gap-4"><div><label className="block text-[10px] font-black text-slate-400 uppercase mb-1.5">Monto ($)</label><input type="number" className="w-full p-3 bg-slate-50 border rounded-xl outline-none text-rose-600 font-bold" value={editingExpense.amount} onChange={e => setEditingExpense({...editingExpense, amount: e.target.value})} required/></div><div><label className="block text-[10px] font-black text-slate-400 uppercase mb-1.5">Estado</label><select className="w-full p-3 bg-slate-50 border rounded-xl outline-none" value={editingExpense.status} onChange={e => setEditingExpense({...editingExpense, status: e.target.value})}><option value="Pagado">Pagado</option><option value="Adeudo">Adeudo</option></select></div></div>
                      <div><label className="block text-[10px] font-black text-slate-400 uppercase mb-1.5">Descripción</label><input type="text" className="w-full p-3 bg-slate-50 border rounded-xl outline-none" value={editingExpense.description} onChange={e => setEditingExpense({...editingExpense, description: e.target.value})} required/></div>
                      <div><label className="block text-[10px] font-black text-slate-400 uppercase mb-1.5">Observaciones</label><textarea className="w-full p-3 bg-slate-50 border rounded-xl outline-none resize-none" rows="2" value={editingExpense.notes} onChange={e => setEditingExpense({...editingExpense, notes: e.target.value})}></textarea></div>
                      <button type="submit" className="w-full bg-slate-900 text-white font-bold py-3.5 rounded-xl mt-4">Actualizar Gasto</button>
                    </form>
                  </div>
                </div>
              )}
              {showCatModal && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                  <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden p-6">
                    <h3 className="font-black text-xl text-slate-800 mb-4">Categorías de Gastos</h3>
                    <div className="flex gap-2 mb-4"><input type="text" value={newCatName} onChange={e=>setNewCatName(e.target.value)} className="flex-1 p-2 bg-slate-50 border rounded-lg outline-none text-sm" placeholder="Nueva categoría..."/><button type="button" onClick={handleAddCategory} className="bg-emerald-600 text-white px-4 rounded-lg font-bold">+</button></div>
                    <div className="max-h-60 overflow-y-auto border border-slate-100 rounded-lg">{expenseCategories.map(c => <div key={c.id} className="flex justify-between p-3 border-b hover:bg-slate-50"><span className="text-sm font-bold text-slate-700">{c.name}</span><button type="button" onClick={() => handleDeleteCategory(c.id)} className="text-rose-500"><i className="fa-solid fa-trash"></i></button></div>)}</div>
                    <button type="button" onClick={() => setShowCatModal(false)} className="w-full mt-4 bg-slate-100 text-slate-700 font-bold py-2.5 rounded-lg">Cerrar</button>
                  </div>
                </div>
              )}
            </div>
          );
        }

        function MarketingHub({ handleCopyText, showToast, callGeminiAI }) {
          const [contractData, setContractData] = useState({ client: '', date: '', type: '', startTime: '', endTime: '', salon: '', depto: '', discount: '', deposit: '' });
          const [generatedContract, setGeneratedContract] = useState('');
          const [lockCode, setLockCode] = useState('');
          const [manualIncludesDepto, setManualIncludesDepto] = useState(false);
          const [generatedManual, setGeneratedManual] = useState('');
          const [copiedContract, setCopiedContract] = useState(false);
          const [copiedManual, setCopiedManual] = useState(false);
          const [aiPostTopic, setAiPostTopic] = useState('');
          const [generatedPost, setGeneratedPost] = useState('');
          const [isAiLoading, setIsAiLoading] = useState(false);
          const [copiedPost, setCopiedPost] = useState(false);

          const handleGeneratePost = async () => {
              if(!aiPostTopic.trim()) return showToast('Escribe de qué tratará tu post', 'error');
              setIsAiLoading(true);
              try {
                  const prompt = `Escribe un post muy atractivo y persuasivo para Instagram/Facebook sobre este tema: "${aiPostTopic}". Recuerda que somos "Casa Copal", un salón de eventos familiares con alberca, asador y departamento privado en Cabo San Lucas. Usa emojis, un tono amigable, persuasivo y termina SIEMPRE con un llamado a la acción invitando a reservar enviando un WhatsApp al 624 320 3289.`;
                  const result = await callGeminiAI(prompt);
                  if(result) setGeneratedPost(result);
              } catch (err) { showToast('IA: ' + (err.message || 'Error desconocido'), 'error'); } finally { setIsAiLoading(false); }
          };

          const generateContract = () => {
            const salon = Number(contractData.salon) || 0; const depto = Number(contractData.depto) || 0; const discountPct = Number(contractData.discount) || 0; const deposit = Number(contractData.deposit) || 0;
            const subtotal = salon + depto; const discountAmount = subtotal * (discountPct / 100); const total = subtotal - discountAmount; const balance = total - deposit;
            const today = new Date(); const todayStr = `${today.getDate()}/${today.getMonth()+1}/${today.getFullYear()}`;
            let dateFormatted = '[Fecha]'; if (contractData.date) { const parts = contractData.date.split('-'); dateFormatted = `${parts[2]}/${parts[1]}/${parts[0]}`; }
            let costBreakdown = "";
            if (salon > 0) costBreakdown += `Costo Salón: $${salon.toLocaleString()} MXN\n`; if (depto > 0) costBreakdown += `Costo Depto: $${depto.toLocaleString()} MXN\n`;
            if (discountPct > 0) costBreakdown += `Descuento Aplicado (${discountPct}%): -$${discountAmount.toLocaleString()} MXN\n`;
            if (salon === 0 && depto === 0) costBreakdown += `Costo Renta: $0 MXN\n`;

            const text = `*CONTRATO DE RENTA DE ESPACIO "CASA COPAL"* 🌿\nFECHA: ${todayStr}\n\n*1. LAS PARTES*\nArrendador: Casa Copal Eventos\nCliente: ${contractData.client || '[Nombre]'}\n\n*2. DETALLES DEL EVENTO*\nFecha: ${dateFormatted}\nHorario: De ${contractData.startTime || '[Inicio]'} a ${contractData.endTime || '[Fin]'} hrs.\nTipo: ${contractData.type || '[Tipo de Evento]'} (Ambiente familiar)\nMáximo Invitados: 50 personas.\n\n*3. FINANZAS*\n${costBreakdown.trim()}\n*TOTAL A PAGAR:* $${total.toLocaleString()} MXN\n\nAnticipo Recibido: $${deposit.toLocaleString()} MXN\n*SALDO A LIQUIDAR:* $${balance.toLocaleString()} MXN (Máximo 1 día antes del evento).\n*DEPÓSITO EN GARANTÍA:* $1,500 MXN (Reembolsable 24hrs post-evento).\n\n*4. PENALIZACIONES (CONDICIONES DE GARANTÍA)*\nEl depósito de $1,500 NO será devuelto en los siguientes casos:\nA) Ruido excesivo fuera de horario.\nB) Ingresar botellas/vasos de vidrio en área de alberca.\nC) Daños al mobiliario, uso de pirotecnia o confeti metálico.\nD) Dejar asador encendido, refrigerador sucio o basura fuera de su lugar.\n\n*5. CANCELACIONES*\nCancelaciones con menos de 6 días de anticipación no son reembolsables.\n\n✍️ *FIRMA DIGITAL DE CONFORMIDAD*\nPara confirmar tu reserva, aceptar este contrato y asegurar tu fecha, por favor responde a este mensaje con la frase:\n*"Acepto términos y condiciones"*`;
            setGeneratedContract(text);
          };

          const generateManual = () => {
            const code = lockCode.trim() || '[CÓDIGO]';
            const deptoText = manualIncludesDepto ? `\n🏡 ACCESO AL DEPARTAMENTO\nLa clave para entrar al departamento es la misma que para entrar al salón.\n` : '';
            const text = `🌿 ¡BIENVENIDOS A CASA COPAL! 🌿\nTu evento está listo. Deseamos que pasen un día increíble en familia. Aquí tienes tu guía de acceso:\n\n🔓 1. TU ACCESO DIGITAL (SELF CHECK-IN)\nTu código para entrar hoy es: *${code}*\n(Despierta la cerradura tocando la pantalla, digita el código y presiona #). Ya entrando hay una caja de seguridad con las llaves del salon en caso de ser necesario.\n${deptoText}\n📶 2. RED WI-FI\nRed: MERCUSYS_2FB4\nContraseña: 83763557\n\n📹 3. CHECK-IN VIRTUAL (Inventario)\nPara proteger tu depósito, al llegar envíanos un *video rápido* mostrando el área limpia y completa.\n\n🛑 4. TIPS PARA UN GRAN EVENTO\n• Ruido: Disfruta la música, pero apágala puntualmente a tu hora de salida.\n• Alberca: No usar cristal ni vidrio cerca del agua.\n\n📸 5. CHECK-OUT (Al irse)\nAl final de tu evento, envíanos 2 fotos para procesar tu devolución:\n1. Asador apagado y sin fuego.\n2. Basura en sus botes y refrigerador vacío.\n\nSi tienes alguna duda, escríbenos. ¡Que lo disfruten mucho! 🥳`;
            setGeneratedManual(text);
          };

          useEffect(() => { generateManual(); }, [lockCode, manualIncludesDepto]); 
          
          const handleDownloadFolleto = async (elementId, filename) => {
            const element = document.getElementById(elementId);
            if (!element || !window.html2canvas) return showToast('Error al cargar librería', 'error');
            try { showToast('Generando imagen...'); const canvas = await window.html2canvas(element, { scale: 3, useCORS: true, backgroundColor: '#ffffff' }); const link = document.createElement('a'); link.download = filename; link.href = canvas.toDataURL('image/png'); link.click(); } catch (err) { showToast('Error al exportar', 'error'); }
          };

          return (
            <div className="animate-fade-in space-y-6 pb-20">
              <div><h2 className="text-3xl font-black text-slate-800">Hub de Ventas</h2></div>
              {/* IA Redes Sociales */}
              <div className="bg-gradient-to-r from-fuchsia-50 to-pink-50 p-6 rounded-3xl shadow-sm border flex flex-col md:flex-row gap-6">
                  <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center shrink-0"><Sparkles className="text-fuchsia-500 w-8 h-8" /></div>
                  <div className="flex-1 w-full space-y-3">

                <div className="bg-white p-6 rounded-3xl shadow-sm border h-fit">

                  <div className="space-y-4">
                    <input type="text" className="w-full p-2.5 border rounded-lg bg-slate-50 text-sm" placeholder="Nombre Cliente" value={contractData.client} onChange={e=>setContractData({...contractData, client: e.target.value})}/>
                    <div className="grid grid-cols-2 gap-4"><input type="date" className="w-full p-2.5 border rounded-lg bg-slate-50 text-sm" value={contractData.date} onChange={e=>setContractData({...contractData, date: e.target.value})}/><input type="text" className="w-full p-2.5 border rounded-lg bg-slate-50 text-sm" placeholder="Tipo (Ej. Cumpleaños)" value={contractData.type} onChange={e=>setContractData({...contractData, type: e.target.value})}/></div>
                    <div className="grid grid-cols-2 gap-4"><input type="time" className="w-full p-2.5 border rounded-lg bg-slate-50 text-sm" value={contractData.startTime} onChange={e=>setContractData({...contractData, startTime: e.target.value})}/><input type="time" className="w-full p-2.5 border rounded-lg bg-slate-50 text-sm" value={contractData.endTime} onChange={e=>setContractData({...contractData, endTime: e.target.value})}/></div>
                    <div className="grid grid-cols-2 gap-4"><input type="number" placeholder="Costo Salón" className="w-full p-2.5 border rounded-lg bg-slate-50 text-sm" value={contractData.salon} onChange={e=>setContractData({...contractData, salon: e.target.value})}/><input type="number" placeholder="Costo Depto" className="w-full p-2.5 border rounded-lg bg-slate-50 text-sm" value={contractData.depto} onChange={e=>setContractData({...contractData, depto: e.target.value})}/></div>
                    <div className="grid grid-cols-2 gap-4"><input type="number" placeholder="Descuento (%)" className="w-full p-2.5 border rounded-lg bg-blue-50 text-blue-700 font-bold text-sm" value={contractData.discount} onChange={e=>setContractData({...contractData, discount: e.target.value})}/><input type="number" placeholder="Anticipo Recibido" className="w-full p-2.5 border rounded-lg bg-emerald-50 text-emerald-700 font-bold text-sm" value={contractData.deposit} onChange={e=>setContractData({...contractData, deposit: e.target.value})}/></div>

                    <div className="bg-slate-50 p-4 rounded-xl mb-4 flex gap-2"><input type="text" className="flex-1 p-2 border rounded-lg" placeholder="Código Puerta (Ej. 1234)" value={lockCode} onChange={e=>setLockCode(e.target.value)} /><label className="flex items-center gap-1 font-bold text-sm text-slate-600"><input type="checkbox" className="w-4 h-4" checked={manualIncludesDepto} onChange={e=>setManualIncludesDepto(e.target.checked)}/> + Depto</label></div>

                    <textarea readOnly value={generatedManual} className="w-full min-h-[220px] p-4 bg-slate-50 text-sm resize-none outline-none"></textarea>

                </div>

              {/* Generador de Folletos Originales Actualizados */}

                <h3 className="font-black text-xl mb-6">Folletos Digitales</h3>

                    {/* Folleto Salón Reemplazado */}

                                <img src="https://i.postimg.cc/Xq68hKSx/foto_1.png" crossOrigin="anonymous" className="w-full h-[190px] object-cover rounded-b-[40px] shadow-sm" />
                                <div className="absolute -bottom-6 left-6 w-32 h-32 bg-white rounded-2xl p-1 shadow-xl z-20 transform -rotate-3">
                                    <img src="https://i.postimg.cc/x1c38XjB/foto_6.jpg" crossOrigin="anonymous" className="w-full h-full object-cover rounded-xl" />
                                </div>
                                <div className="absolute -bottom-2 right-6 w-24 h-24 bg-white rounded-full p-1 shadow-lg z-10">
                                    <img src="https://i.postimg.cc/VkdWvJL1/foto_4.png" crossOrigin="anonymous" className="w-full h-full object-cover rounded-full" />
                                </div>
                            </div>
                            <div className="px-8 pt-6 pb-4 flex-1 flex flex-col bg-white">

                                </div>
                                <div className="bg-slate-50 rounded-2xl p-3.5 mb-4 border border-slate-100 shadow-inner flex flex-col gap-1.5">
                                    <div className="flex justify-between items-center px-2">
                                        <p className="text-[11px] font-bold text-slate-500 uppercase tracking-wider">Lunes a Jueves</p>
                                        <p className="text-lg font-black text-slate-800">$4,000</p>
                                    </div>
                                    <div className="w-full h-px bg-slate-200"></div>
                                    <div className="flex justify-between items-center px-2">
                                        <p className="text-[11px] font-bold text-emerald-600 uppercase tracking-wider">Viernes a Domingo</p>
                                        <p className="text-lg font-black text-slate-800">$5,000</p>
                                    </div>
                                </div>
                                <ul className="space-y-2 text-[12px] text-slate-700 font-medium flex-1 px-1">
                                    <li className="flex items-start gap-3"><span className="text-emerald-500 text-[14px] mt-[-1px]">✔️</span> <span><strong>Paquete de 7 horas</strong> de servicio.</span></li>
                                    <li className="flex items-start gap-3"><span className="text-emerald-500 text-[14px] mt-[-1px]">✔️</span> <span><strong>Mobiliario listo</strong> para 50 invitados.</span></li>
                                    <li className="flex items-start gap-3"><span className="text-emerald-500 text-[14px] mt-[-1px]">✔️</span> <span>Área techada fresca con <strong>excelente sombra</strong>.</span></li>
                                    <li className="flex items-start gap-3"><span className="text-emerald-500 text-[14px] mt-[-1px]">✔️</span> <span>Cocina con asador, <strong>estufa y hielera grande</strong>.</span></li>
                                    <li className="flex items-start gap-3"><span className="text-emerald-500 text-[14px] mt-[-1px]">✔️</span> <span><strong>Dos baños</strong> (exterior e interior con regadera).</span></li>
                                    <li className="flex items-start gap-3 bg-emerald-50 p-2 rounded-lg border border-emerald-100"><span className="text-emerald-600 text-[14px] mt-[-1px]">🔊</span> <span className="text-emerald-900"><strong>Bocina Bluetooth</strong> incluida.</span></li>
                                    <li className="flex items-start gap-3 mt-1"><span className="text-red-500 text-[14px] mt-[-1px]">📍</span> <span><strong>Ubicación:</strong> Col. Mezquites.</span></li>
                                </ul>
                                
                                <div className="mt-auto text-center pt-2 flex flex-col gap-1 items-center">
                                    <div className="inline-block bg-slate-900 text-white text-[10px] font-bold px-6 py-2 rounded-full uppercase tracking-widest shadow-md">
                                        ¡Aparta tu fecha con el 50%!
                                    </div>
                                    <div className="text-slate-700 text-[11px] font-black bg-slate-100 px-4 py-1 rounded-full border border-slate-200">
                                        📲 Reservas: 624 320 3289
                                    </div>
                                    <div className="text-slate-400 text-[10px] font-bold tracking-wider mt-0.5">
                                        <i className="fa-solid fa-globe text-emerald-500"></i> www.casacopal.com.mx
                                    </div>
                                </div>
                            </div>
                        </div>
                       <button onClick={() => handleDownloadFolleto('folleto-salon', 'CasaCopal_Salon.png')} className="bg-emerald-600 text-white font-bold py-2.5 px-6 rounded-xl mt-4">Descargar Folleto Salón</button>
                    </div>

                    {/* Folleto Depto Reemplazado */}
                    <div className="flex flex-col items-center bg-white p-6 rounded-3xl border shadow-sm">
                       <div id="folleto-depto" className="bg-white w-[400px] h-[700px] relative overflow-hidden rounded-2xl flex flex-col shadow-xl" style={{ fontFamily: "'Montserrat', sans-serif" }}>
                            <div className="px-8 pt-8 pb-2 shrink-0">
                                <span className="inline-block bg-slate-100 text-slate-500 text-[9px] font-bold px-3 py-1 rounded-full uppercase tracking-widest mb-2 border border-slate-200">Extiende tu experiencia</span>
                                <h1 className="text-3xl font-black text-slate-900 leading-tight">DEPARTAMENTO<br /><span className="text-emerald-600">PRIVADO</span></h1>
                            </div>
                            
                            <div className="relative h-[220px] w-full shrink-0 mt-1">
                                <div className="absolute top-0 left-8 right-8 h-[160px] rounded-2xl shadow-sm overflow-hidden">
                                    <img src="https://i.postimg.cc/K4XQyFBj/20260201_232054000_i_OS.jpg" crossOrigin="anonymous" className="w-full h-full object-cover" alt="Recámara" />
                                </div>
                                <div className="absolute top-[90px] left-5 w-[180px] h-[120px] bg-white rounded-2xl p-1.5 shadow-2xl z-10 transform -rotate-3">
                                    <img src="https://i.postimg.cc/WtRSPjgb/cocina.jpg" crossOrigin="anonymous" className="w-full h-full object-cover rounded-xl" alt="Cocina Sala" />
                                </div>
                                <div className="absolute top-[110px] right-6 w-[95px] h-[95px] bg-white rounded-full p-1 shadow-xl z-20">
                                    <div className="w-full h-full rounded-full overflow-hidden">
                                        <img src="https://i.postimg.cc/cL22hvVG/bano-2.jpg" crossOrigin="anonymous" className="w-full h-full object-cover -rotate-90 scale-[1.35]" alt="Baño" />
                                    </div>
                                </div>
                            </div>

                            <div className="px-8 flex-1 flex flex-col pb-4 pt-2">
                                <p className="text-[12px] text-slate-600 mb-4 font-medium leading-snug">
                                    ¿No quieres manejar de noche? Disfruta de un espacio exclusivo y equipado para descansar al terminar tu evento.
                                </p>
                                <div className="grid grid-cols-2 gap-2 mb-4 text-[11px] text-slate-700 font-semibold">
                                    <div className="flex items-center gap-2 bg-slate-50 p-2 rounded-xl border border-slate-100"><span className="text-emerald-500 text-base">🛏️</span> Cama Queen Size</div>
                                    <div className="flex items-center gap-2 bg-slate-50 p-2 rounded-xl border border-slate-100"><span className="text-emerald-500 text-base">🛋️</span> Sala de estar</div>
                                    <div className="flex items-center gap-2 bg-slate-50 p-2 rounded-xl border border-slate-100"><span className="text-emerald-500 text-base">🍳</span> Cocina equipada</div>
                                    <div className="flex items-center gap-2 bg-slate-50 p-2 rounded-xl border border-slate-100"><span className="text-emerald-500 text-base">🚪</span> Acceso privado</div>
                                </div>
                                <div className="flex gap-2 mt-auto shrink-0">
                                    <div className="flex-1 border border-slate-200 rounded-xl p-2 text-center bg-white shadow-sm flex flex-col justify-center">
                                        <p className="text-[8px] text-slate-400 uppercase tracking-wider font-bold mb-0.5">Lunes a Jueves</p>
                                        <p className="text-lg font-black text-slate-800 leading-none">+$1,600</p>
                                        <p className="text-[7px] font-bold text-slate-400 uppercase mt-1">por noche</p>
                                    </div>
                                    <div className="flex-1 bg-emerald-50 border border-emerald-100 rounded-xl p-2 text-center shadow-sm flex flex-col justify-center">
                                        <p className="text-[8px] text-emerald-700 uppercase tracking-wider font-bold mb-0.5">Viernes a Domingo</p>
                                        <p className="text-lg font-black text-emerald-700 leading-none">+$2,000</p>
                                        <p className="text-[7px] font-bold text-emerald-600 uppercase mt-1">por noche</p>
                                    </div>
                                </div>

                                <div className="text-center pt-2 shrink-0 flex flex-col gap-1 items-center">
                                    <div className="inline-block bg-slate-100 text-slate-700 text-[10px] font-black px-4 py-1 rounded-full border border-slate-200">
                                        📲 Reservas: 624 320 3289
                                    </div>
                                    <div className="text-slate-400 text-[10px] font-bold tracking-wider mt-0.5">
                                        <i className="fa-solid fa-globe text-emerald-500"></i> www.casacopal.com.mx
                                    </div>
                                </div>
                            </div>
                        </div>
                       <button onClick={() => handleDownloadFolleto('folleto-depto', 'CasaCopal_Depto.png')} className="bg-blue-600 text-white font-bold py-2.5 px-6 rounded-xl mt-4">Descargar Folleto Depto</button>
                    </div>
                </div>
              </div>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<CasaCopalAdmin />);
    </script>
</body>
</html>
