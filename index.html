<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa Copal Admin - VenueSync</title>
    
    <!-- Traductores y Estilos necesarios para ejecutar React sin VS Code -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- LIBRERÍA NUEVA: Para descargar los folletos como imágenes HD -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- TIPOGRAFÍA ORIGINAL DE LOS FOLLETOS (Montserrat) -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">

    <!-- MAPA DE IMPORTACIONES -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
          "react-dom": "https://esm.sh/react-dom@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react"
        }
      }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, collection, onSnapshot, addDoc, doc, updateDoc, deleteDoc, getDocs, setDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        import { LayoutDashboard, CalendarDays, WalletCards, Users, Megaphone, PlusCircle, LogOut, CheckCircle2, AlertCircle, TrendingUp, FileText, Copy, Smartphone, Download, UserCircle, Settings, Lock, Sparkles, Loader2, FileSpreadsheet } from 'lucide-react';

        // ============================================================================
        // 1. CONFIGURACIÓN FIREBASE
        // ============================================================================
        const firebaseConfig = {
          apiKey: "AIzaSyDSyCBJ3VeLNYgFjo4qo3pysBJPYEfmryQ",
          authDomain: "casa-copal-web.firebaseapp.com",
          projectId: "casa-copal-web",
          storageBucket: "casa-copal-web.firebasestorage.app",
          messagingSenderId: "1066820914348",
          appId: "1:1066820914348:web:ba00a2fdac45b4f478a309"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ============================================================================
        // 2. UTILIDAD GEMINI API (IA)
        // ============================================================================
        const callGeminiAI = async (prompt, expectJson = false) => {
            const apiKey = "AIzaSyDCFd4xJLZ7wazjwZ5cGLnl-z8PhQfKncY"; 
            const modelVersion = "gemini-1.5-flash"; 

            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelVersion}:generateContent?key=${apiKey}`;
            
            let finalPrompt = "Eres un asistente de negocios para un salón de eventos familiares llamado Casa Copal.\n\n" + prompt;
            if (expectJson) {
                finalPrompt += "\n\nIMPORTANTE: Devuelve ÚNICAMENTE un objeto JSON válido. No uses bloques de código de markdown, ni saludes, ni agregues texto extra.";
            }

            const payload = { contents: [{ parts: [{ text: finalPrompt }] }] };

            let retries = 3;
            let delay = 2000;

            while (retries > 0) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    const data = await response.json();
                    
                    if (!response.ok) {
                        const errMsg = data.error?.message || '';
                        if (errMsg.toLowerCase().includes("high demand") || response.status === 503 || response.status === 429) {
                            throw new Error("HIGH_DEMAND");
                        }
                        throw new Error(errMsg || 'Error de Google API');
                    }
                    
                    let textResult = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if(!textResult) throw new Error('La IA devolvió una respuesta vacía.');
                    
                    if (expectJson) {
                        // Limpiar backticks si la IA los incluye
                        textResult = textResult.replace(/[\`]{3}json\n?/g, '').replace(/[\`]{3}\n?/g, '').trim();
                        return JSON.parse(textResult);
                    }
                    
                    return textResult;
                } catch (error) {
                    retries--;
                    if (retries === 0) {
                        if (error.message === "HIGH_DEMAND") {
                            throw new Error("Los servidores de IA están saturados en este momento. Espera unos segundos y vuelve a intentar.");
                        }
                        throw error;
                    }
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 1.5; 
                }
            }
        };

        const TEAM_PROFILES = {
          'pierreretrock@gmail.com': { id: 'admin', name: 'Pierre', role: 'Administrador', canViewAll: true },
          'faviolavizcarratirado@gmail.com': { id: 'fabiola', name: 'Fabiola', role: 'Finanzas', canViewAll: true },
          'gpecamargo19@gmail.com': { id: 'lupita', name: 'Lupita', role: 'Capturista', canViewAll: false }
        };

        function CasaCopalAdmin() {
          const [user, setUser] = useState(null);
          const [activeProfile, setActiveProfile] = useState(null);
          const [activeTab, setActiveTab] = useState('dashboard');
          const [toast, setToast] = useState({ show: false, msg: '', type: 'success' });
          const [isAuthChecking, setIsAuthChecking] = useState(true);
          const [dbError, setDbError] = useState(''); 

          const [loginEmail, setLoginEmail] = useState('');
          const [loginPassword, setLoginPassword] = useState('');
          const [loginError, setLoginError] = useState('');

          const [bookings, setBookings] = useState([]);
          const [expenses, setExpenses] = useState([]);
          const [clients, setClients] = useState([]);
          const [clientNotes, setClientNotes] = useState({});
          const [expenseCategories, setExpenseCategories] = useState([]);
          const [quotes, setQuotes] = useState([]); 
          const [quoteToConvert, setQuoteToConvert] = useState(null); 

          useEffect(() => {
            const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
              setUser(currentUser);
              if (currentUser && currentUser.email) {
                const profile = TEAM_PROFILES[currentUser.email] || { id: 'guest', name: 'Usuario Limitado', role: 'Invitado', canViewAll: false };
                setActiveProfile({ ...profile, email: currentUser.email });
                if (!profile.canViewAll) setActiveTab('expenses');
                else setActiveTab('dashboard');
              }
              setIsAuthChecking(false);
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;

            const bookingsRef = collection(db, 'reservaciones');
            const expensesRef = collection(db, 'gastos');
            const categoriesRef = collection(db, 'categorias_gastos');
            const quotesRef = collection(db, 'cotizaciones');
            const clientsRef = collection(db, 'clientes'); 

            const handleDbError = (err) => {
              console.error("Firestore Error Capturado de forma segura:", err);
              if (err.code === 'permission-denied') {
                setDbError('⛔ Faltan Permisos en Firebase: Debes agregar la regla "allow read, write: if request.auth != null;" para las colecciones "clientes" y "cotizaciones" en tu consola.');
              } else {
                setDbError('Error DB: ' + err.message);
              }
            };

            const checkCategories = async () => {
              try {
                const snap = await getDocs(categoriesRef);
                if (snap.empty) {
                  const defaults = ['Mantenimiento', 'Servicios Públicos', 'Insumos/Limpieza', 'Nómina', 'Publicidad'];
                  defaults.forEach(c => addDoc(categoriesRef, { name: c }));
                }
              } catch (err) {
                handleDbError(err);
              }
            };
            checkCategories();

            const unsubBookings = onSnapshot(bookingsRef, (snapshot) => {
              setDbError(''); 
              const data = snapshot.docs.map(doc => {
                  const d = doc.data();
                  let rawDate = d.date || d.fecha || d.Fecha || d.Date || d.fecha_evento || d.fechaEvento || d.fecha_reserva || d.dia || '';
                  if (!rawDate && /^\d{4}-\d{2}-\d{2}$/.test(doc.id)) rawDate = doc.id;
                  
                  if (!rawDate) {
                      for (const key in d) {
                          if (typeof d[key] === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(d[key])) {
                              rawDate = d[key];
                              break;
                          }
                      }
                  }

                  if (rawDate && (rawDate.includes('/') || (rawDate.includes('-') && rawDate.indexOf('-') <= 2))) {
                      const sep = rawDate.includes('/') ? '/' : '-';
                      const p = rawDate.split(sep);
                      if (p.length === 3 && p[2].length >= 4) rawDate = `${p[2]}-${p[1].padStart(2, '0')}-${p[0].padStart(2, '0')}`;
                  }
                  if (!rawDate && d.timestamp) {
                      try {
                          const dateObj = typeof d.timestamp === 'number' ? new Date(d.timestamp) : new Date(d.timestamp.toDate());
                          rawDate = dateObj.toISOString().split('T')[0];
                      } catch(e) {}
                  }

                  d._fechaStr = rawDate || '';
                  d._nombreStr = d.cliente_nombre || d.nombre || d.Nombre || d.clientName || d.cliente || 'Sin Nombre';
                  d._telefonoStr = d.cliente_telefono || d.telefono || d.Telefono || d.phone || d.celular || '';
                  d._correoStr = d.cliente_correo || d.correo || d.email || d.Email || '';
                  d._precioTotal = Number(d.precio_total || d.total || d.precio || d.costo || d.costo_total || d.Total || 0);
                  d._anticipo = Number(d.anticipo || d.enganche || d.deposito || d.Anticipo || 0);
                  
                  d._status = d.status || d.estado || d.Estado || 'Pendiente';
                  if (d._precioTotal === 0) {
                      d._status = 'Liquidado'; 
                  } else if (d._anticipo >= d._precioTotal && d._precioTotal > 0) {
                      d._status = 'Liquidado';
                  } else if (d._anticipo > 0 && d._status === 'Pendiente') {
                      d._status = 'Anticipado';
                  }

                  return { id: doc.id, ...d };
              });
              
              data.sort((a, b) => {
                  if (a._fechaStr > b._fechaStr) return -1;
                  if (a._fechaStr < b._fechaStr) return 1;
                  return 0;
              });
              
              setBookings(data);

              const uniqueClients = {};
              data.filter(b => b._status === 'Anticipado' || b._status === 'Liquidado' || b._status === 'Confirmada').forEach(res => {
                const rawPhone = res._telefonoStr;
                if (rawPhone) {
                  let cleanPhone = rawPhone.replace(/\D/g, '');
                  if (cleanPhone.length > 10) cleanPhone = cleanPhone.slice(-10);

                  if (!uniqueClients[cleanPhone]) {
                    uniqueClients[cleanPhone] = { id: cleanPhone, name: res._nombreStr, phone: rawPhone, totalBookings: 0, totalSpent: 0 };
                  }
                  uniqueClients[cleanPhone].totalBookings += 1;
                  uniqueClients[cleanPhone].totalSpent += res._precioTotal;
                }
              });
              setClients(Object.values(uniqueClients));
            }, handleDbError);

            const unsubExpenses = onSnapshot(expensesRef, (snapshot) => {
              const data = snapshot.docs.map(doc => {
                  const d = doc.data();
                  let rawDate = d.date || d.fecha || d.Fecha || d.Date || d.dia || '';
                  if (!rawDate && /^\d{4}-\d{2}-\d{2}$/.test(doc.id)) rawDate = doc.id;
                  
                  if (!rawDate) {
                      for (const key in d) {
                          if (typeof d[key] === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(d[key])) {
                              rawDate = d[key];
                              break;
                          }
                      }
                  }
                  if (rawDate && (rawDate.includes('/') || (rawDate.includes('-') && rawDate.indexOf('-') <= 2))) {
                      const sep = rawDate.includes('/') ? '/' : '-';
                      const p = rawDate.split(sep);
                      if (p.length === 3 && p[2].length >= 4) rawDate = `${p[2]}-${p[1].padStart(2, '0')}-${p[0].padStart(2, '0')}`;
                  }
                  if (!rawDate && d.timestamp) {
                      try {
                          const dateObj = typeof d.timestamp === 'number' ? new Date(d.timestamp) : new Date(d.timestamp.toDate());
                          rawDate = dateObj.toISOString().split('T')[0];
                      } catch(e) {}
                  }

                  d._fechaStr = rawDate || '';
                  d._monto = Number(d.amount || d.monto || d.cantidad || d.Total || d.total || 0);
                  d._desc = d.description || d.descripcion || d.concepto || d.detalle || 'Sin descripción';
                  d._cat = d.category || d.categoria || d.tipo || 'General';
                  d._status = d.status || d.estado || d.estatus || 'Pagado';
                  
                  return { id: doc.id, ...d };
              });
              
              data.sort((a, b) => {
                  if (a._fechaStr > b._fechaStr) return -1;
                  if (a._fechaStr < b._fechaStr) return 1;
                  return 0;
              });
              setExpenses(data);
            }, handleDbError);

            const unsubCategories = onSnapshot(categoriesRef, (snapshot) => {
              const data = snapshot.docs.map(doc => ({ id: doc.id, name: doc.data().name }));
              data.sort((a, b) => a.name.localeCompare(b.name));
              setExpenseCategories(data);
            }, handleDbError);

            const unsubQuotes = onSnapshot(quotesRef, (snapshot) => {
              const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              data.sort((a, b) => b.timestamp - a.timestamp);
              setQuotes(data);
            }, handleDbError);

            const unsubClientsNotes = onSnapshot(clientsRef, (snapshot) => {
              const notes = {};
              snapshot.docs.forEach(doc => { notes[doc.id] = doc.data().notas; });
              setClientNotes(notes);
            }, handleDbError);

            return () => { unsubBookings(); unsubExpenses(); unsubCategories(); unsubQuotes(); unsubClientsNotes(); };
          }, [user]);

          const handleLogin = async (e) => {
            e.preventDefault();
            setLoginError('');
            try {
              await signInWithEmailAndPassword(auth, loginEmail, loginPassword);
            } catch (error) {
              setLoginError('Error de Firebase: ' + error.code);
            }
          };

          const handleLogout = () => {
            signOut(auth);
          };

          const showToast = (msg, type = 'success') => {
            setToast({ show: true, msg, type });
            setTimeout(() => setToast({ show: false, msg: '', type: 'success' }), 3000);
          };

          const handleCopyText = (text) => {
            try {
              const textArea = document.createElement("textarea");
              textArea.value = text;
              textArea.style.top = "0";
              textArea.style.left = "0";
              textArea.style.position = "fixed";
              document.body.appendChild(textArea);
              textArea.focus();
              textArea.select();
              const successful = document.execCommand('copy');
              document.body.removeChild(textArea);
              if (successful) showToast('Texto copiado al portapapeles');
              else showToast('Error al copiar el texto', 'error');
            } catch (err) {
              showToast('Error al copiar el texto', 'error');
            }
          };

          const totalIncome = useMemo(() => bookings.reduce((sum, b) => {
            if (b._status === 'Liquidado') return sum + b._precioTotal;
            if (b._status === 'Anticipado' || b._status === 'Confirmada') return sum + b._anticipo;
            return sum;
          }, 0), [bookings]);

          const totalExpenses = useMemo(() => expenses.filter(e => e._status === 'Pagado' || !e._status).reduce((sum, e) => sum + e._monto, 0), [expenses]);
          const netProfit = totalIncome - totalExpenses;

          const chartData = useMemo(() => {
            const months = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
            const data = months.map(name => ({ name, Ingresos: 0, Gastos: 0 }));
            
            bookings.forEach(b => {
              if (b._status === 'Liquidado' || b._status === 'Anticipado' || b._status === 'Confirmada') {
                let date;
                if (b._fechaStr && b._fechaStr.includes('-')) {
                    const p = b._fechaStr.split('-');
                    date = new Date(p[0], p[1]-1, p[2]);
                } else if (b.timestamp) {
                    date = new Date(b.timestamp);
                }
                if (date && !isNaN(date.getMonth())) {
                   data[date.getMonth()].Ingresos += (b._status === 'Liquidado' ? b._precioTotal : b._anticipo);
                }
              }
            });

            expenses.forEach(e => {
              if (e._status === 'Pagado') {
                let date;
                if (e._fechaStr && e._fechaStr.includes('-')) {
                    const p = e._fechaStr.split('-');
                    date = new Date(p[0], p[1]-1, p[2]);
                } else if (e.timestamp) {
                    date = new Date(e.timestamp);
                }
                if (date && !isNaN(date.getMonth())) {
                  data[date.getMonth()].Gastos += e._monto;
                }
              }
            });
            return data;
          }, [bookings, expenses]);

          const displayBookings = useMemo(() => {
             const today = new Date().toISOString().split('T')[0];
             let upcoming = bookings
                .filter(b => b._fechaStr && b._fechaStr >= today)
                .sort((a, b) => a._fechaStr < b._fechaStr ? -1 : 1)
                .slice(0, 5);
             if(upcoming.length === 0 && bookings.length > 0) upcoming = bookings.slice(0, 5);
             return upcoming;
          }, [bookings]);

          if (isAuthChecking) return (
            <div className="flex flex-col h-screen items-center justify-center bg-slate-900 text-white space-y-4">
              <Loader2 className="w-12 h-12 text-emerald-500 animate-spin" />
              <p className="text-sm font-bold tracking-widest uppercase text-slate-400">Conectando con VenueSync...</p>
            </div>
          );

          if (!user) return (
            <div className="flex h-screen bg-slate-50 items-center justify-center p-4">
              <div className="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 w-full max-w-sm animate-fade-in text-center">
                <div className="w-16 h-16 bg-slate-900 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-md">
                  <Lock className="text-emerald-400 w-8 h-8"/>
                </div>
                <h1 className="text-2xl font-black text-slate-800 mb-1">Casa Copal</h1>
                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-8">Admin Panel</p>
                
                <form onSubmit={handleLogin} className="space-y-4 text-left">
                  {loginError && <div className="bg-rose-50 text-rose-600 text-xs p-3 rounded-lg font-bold text-center border border-rose-100">{loginError}</div>}
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">Correo Electrónico</label>
                    <input type="email" required className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-emerald-500 focus:bg-white transition-colors" value={loginEmail} onChange={e=>setLoginEmail(e.target.value)} />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">Contraseña</label>
                    <input type="password" required className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-emerald-500 focus:bg-white transition-colors" value={loginPassword} onChange={e=>setLoginPassword(e.target.value)} />
                  </div>
                  <button type="submit" className="w-full bg-slate-900 text-white font-bold py-3.5 rounded-xl hover:bg-emerald-600 transition-colors shadow-lg mt-2">
                    Iniciar Sesión
                  </button>
                </form>
              </div>
            </div>
          );

          return (
            <div className="flex h-screen bg-slate-50 font-sans text-slate-800 overflow-hidden">
              <aside className="w-64 bg-slate-900 text-white flex flex-col shadow-xl z-20 shrink-0">
                <div className="p-6 border-b border-slate-800 relative">
                  <h1 className="text-2xl font-black tracking-tight text-emerald-400">Casa Copal</h1>
                  <p className="text-[10px] text-slate-400 mt-1.5 uppercase tracking-widest font-bold">
                    Admin <span className="mx-1 opacity-30">•</span> Powered by <span className="text-blue-400 font-black">VenueSync</span>
                  </p>
                </div>
                
                <div className="p-4 bg-slate-800/50 flex items-center justify-between border-b border-slate-800">
                  <div>
                    <p className="text-[10px] text-emerald-400 uppercase font-bold"><UserCircle className="inline w-3 h-3 mr-1"/> {activeProfile.role}</p>
                    <p className="font-semibold text-sm truncate w-32">{activeProfile.name}</p>
                  </div>
                  <button onClick={handleLogout} className="p-2 hover:bg-rose-500 rounded-lg transition-colors text-slate-400 hover:text-white" title="Cerrar Sesión"><LogOut className="w-4 h-4"/></button>
                </div>

                <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
                  {activeProfile.canViewAll && (
                    <>
                      <NavItem icon={<LayoutDashboard/>} label="Dashboard" isActive={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                      <NavItem icon={<CalendarDays/>} label="Centro de Reservas" isActive={activeTab === 'bookings'} onClick={() => setActiveTab('bookings')} badge={bookings.filter(b => b._status === 'Pendiente' || b._status === 'Anticipado').length} />
                      <NavItem icon={<FileText/>} label="Cotizaciones" isActive={activeTab === 'quotes'} onClick={() => setActiveTab('quotes')} />
                    </>
                  )}
                  <NavItem icon={<WalletCards/>} label="Gastos Operativos" isActive={activeTab === 'expenses'} onClick={() => setActiveTab('expenses')} />
                  
                  {activeProfile.canViewAll && (
                    <>
                      <NavItem icon={<Users/>} label="Clientes VIP" isActive={activeTab === 'clients'} onClick={() => setActiveTab('clients')} />
                      <div className="pt-4 mt-4 border-t border-slate-800">
                        <p className="text-xs font-bold text-slate-500 uppercase tracking-widest px-4 mb-2">Herramientas</p>
                        <NavItem icon={<Megaphone/>} label="Hub de Ventas" isActive={activeTab === 'marketing'} onClick={() => setActiveTab('marketing')} />
                      </div>
                    </>
                  )}
                </nav>
              </aside>

              <main className="flex-1 overflow-y-auto relative">
                {toast.show && (
                  <div className={`absolute top-6 right-6 z-50 px-6 py-3 rounded-xl shadow-lg flex items-center gap-3 text-white transform transition-all ${toast.type === 'success' ? 'bg-emerald-600' : 'bg-rose-600'}`}>
                    {toast.type === 'success' ? <CheckCircle2 className="w-5 h-5"/> : <AlertCircle className="w-5 h-5"/>}
                    <span className="font-semibold text-sm">{toast.msg}</span>
                  </div>
                )}

                <div className="p-8">
                  {dbError && (
                    <div className="bg-rose-100 border border-rose-400 text-rose-800 px-6 py-4 rounded-2xl mb-8 flex items-center gap-4 shadow-sm">
                      <AlertCircle className="w-6 h-6 shrink-0 text-rose-600" />
                      <p className="text-sm font-bold">{dbError}</p>
                    </div>
                  )}

                  {activeTab === 'dashboard' && activeProfile.canViewAll && (
                    <div className="animate-fade-in space-y-6">
                      <div>
                        <h2 className="text-3xl font-black text-slate-800">Resumen Financiero</h2>
                        <p className="text-slate-500 font-medium">Ingresos reales (Dinero en caja): <span className="text-emerald-600 font-bold">Anticipos recibidos + Eventos Liquidados</span>.</p>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <StatCard title="Ingresos (Caja Real)" amount={totalIncome} icon={<TrendingUp/>} color="text-emerald-600 bg-emerald-50 border-emerald-100" />
                        <StatCard title="Gastos (Pagados)" amount={totalExpenses} icon={<WalletCards/>} color="text-rose-600 bg-rose-50 border-rose-100" />
                        <StatCard title="Utilidad (Profit)" amount={netProfit} icon={<LayoutDashboard/>} color="text-blue-600 bg-blue-50 border-blue-100" />
                      </div>

                      <DashboardChart data={chartData} />

                      <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 mt-8">
                          <h3 className="text-lg font-bold text-slate-800 mb-4 border-b border-slate-100 pb-3">Próximos Eventos</h3>
                          <div className="overflow-x-auto pb-2">
                              <table className="w-full text-left border-collapse min-w-[800px]">
                                  <thead>
                                      <tr className="bg-slate-50 text-slate-400 text-xs uppercase tracking-wider">
                                          <th className="p-4 font-bold rounded-tl-xl">Fecha</th>
                                          <th className="p-4 font-bold">Cliente</th>
                                          <th className="p-4 font-bold">Total / Anticipo</th>
                                          <th className="p-4 font-bold rounded-tr-xl text-right">Estado</th>
                                      </tr>
                                  </thead>
                                  <tbody>
                                      {displayBookings.map(b => (
                                          <tr key={b.id} className="border-b border-slate-50 hover:bg-slate-50/80 transition-colors">
                                              <td className="p-4 font-bold text-slate-700">{b._fechaStr || 'Sin Fecha Registrada'}</td>
                                              <td className="p-4 text-sm font-bold text-slate-600">{b._nombreStr}</td>
                                              <td className="p-4">
                                                <p className="font-black text-slate-800">${b._precioTotal.toLocaleString('es-MX')}</p>
                                                <p className="text-xs text-slate-500">Anticipo: ${b._anticipo.toLocaleString()}</p>
                                              </td>
                                              <td className="p-4 text-right">
                                                <span className={`text-[10px] font-bold px-2 py-1 rounded-md uppercase tracking-widest ${b._status === 'Liquidado' ? 'bg-emerald-100 text-emerald-700' : b._status === 'Anticipado' || b._status === 'Confirmada' ? 'bg-blue-100 text-blue-700' : 'bg-amber-100 text-amber-700'}`}>
                                                  {b._status === 'Confirmada' ? 'ANTICIPADO' : (b._precioTotal === 0 ? 'CORTESÍA' : b._status)}
                                                </span>
                                              </td>
                                          </tr>
                                      ))}
                                      {displayBookings.length === 0 && <tr><td colSpan="4" className="p-8 text-center text-slate-400">Sin eventos próximos</td></tr>}
                                  </tbody>
                              </table>
                          </div>
                      </div>
                    </div>
                  )}

                  {activeTab === 'bookings' && activeProfile.canViewAll && <BookingsModule db={db} bookings={bookings} showToast={showToast} initialData={quoteToConvert} clearInitialData={() => setQuoteToConvert(null)} />}
                  
                  {activeTab === 'quotes' && activeProfile.canViewAll && <QuotesModule db={db} quotes={quotes} showToast={showToast} onConvertToBooking={(q) => { setQuoteToConvert(q); setActiveTab('bookings'); }} />}

                  {activeTab === 'expenses' && <ExpensesModule db={db} expenses={expenses} expenseCategories={expenseCategories} activeProfile={activeProfile} showToast={showToast} callGeminiAI={callGeminiAI} />}
                  
                  {activeTab === 'clients' && activeProfile.canViewAll && <ClientsModule db={db} clients={clients} clientNotes={clientNotes} showToast={showToast} />}
                  
                  {activeTab === 'marketing' && activeProfile.canViewAll && <MarketingHub handleCopyText={handleCopyText} showToast={showToast} callGeminiAI={callGeminiAI} />}
                </div>
              </main>
            </div>
          );
        }

        // ============================================================================
        // SUB-COMPONENTES 
        // ============================================================================

        function DashboardChart({ data }) {
          const maxVal = Math.max(...data.map(d => Math.max(d.Ingresos, d.Gastos)), 5000); 
          
          return (
            <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 mt-8">
               <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-8 gap-4">
                  <div>
                     <h3 className="text-xl font-black text-slate-800">Rendimiento Anual</h3>
                     <p className="text-sm text-slate-500 font-medium">Comparativa de ingresos y gastos por mes.</p>
                  </div>
                  <div className="flex gap-4 bg-slate-50 p-2 px-4 rounded-xl border border-slate-100">
                     <div className="flex items-center gap-2">
                        <div className="w-3 h-3 rounded-full bg-emerald-400 shadow-sm"></div>
                        <span className="text-[10px] font-black text-slate-600 uppercase tracking-widest">Ingresos</span>
                     </div>
                     <div className="flex items-center gap-2">
                        <div className="w-3 h-3 rounded-full bg-rose-400 shadow-sm"></div>
                        <span className="text-[10px] font-black text-slate-600 uppercase tracking-widest">Gastos</span>
                     </div>
                  </div>
               </div>
               
               <div className="flex items-end h-64 gap-1 sm:gap-2">
                  {data.map((d, i) => {
                    const ingresoPercent = Math.max((d.Ingresos / maxVal) * 100, 1);
                    const gastoPercent = Math.max((d.Gastos / maxVal) * 100, 1);
                    
                    return (
                     <div key={i} className="flex-1 flex flex-col items-center gap-3 group relative h-full">
                        <div className="opacity-0 group-hover:opacity-100 absolute -top-14 bg-slate-900 text-white text-[10px] font-bold p-2.5 rounded-xl pointer-events-none transition-opacity whitespace-nowrap z-10 shadow-xl border border-slate-700">
                           <div className="flex justify-between gap-4"><span className="text-emerald-400">Ingresos:</span> <span>${d.Ingresos.toLocaleString()}</span></div>
                           <div className="flex justify-between gap-4 mt-1"><span className="text-rose-400">Gastos:</span> <span>${d.Gastos.toLocaleString()}</span></div>
                        </div>
                        
                        <div className="w-full flex justify-center items-end gap-0.5 sm:gap-1 h-full relative border-b-2 border-slate-100 pb-1">
                           <div 
                             className="w-full sm:w-1/2 bg-emerald-400 rounded-t-md hover:bg-emerald-500 transition-all duration-300 ease-out shadow-sm"
                             style={{ height: `${ingresoPercent}%` }}
                           ></div>
                           <div 
                             className="w-full sm:w-1/2 bg-rose-400 rounded-t-md hover:bg-rose-500 transition-all duration-300 ease-out shadow-sm"
                             style={{ height: `${gastoPercent}%` }}
                           ></div>
                        </div>
                        <span className="text-[9px] sm:text-[10px] font-black text-slate-400 uppercase tracking-widest">{d.name}</span>
                     </div>
                  )})}
               </div>
            </div>
          );
        }

        function NavItem({ icon, label, isActive, onClick, badge }) {
          return (
            <button onClick={onClick} className={`w-full flex items-center justify-between px-4 py-3 rounded-xl transition-all font-medium ${isActive ? 'bg-emerald-600 text-white font-bold' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
              <div className="flex items-center gap-3">
                {React.cloneElement(icon, { className: 'w-5 h-5' })}
                <span className="text-sm">{label}</span>
              </div>
              {badge > 0 && <span className={`text-[10px] font-black px-2 py-0.5 rounded-md ${isActive ? 'bg-white text-emerald-700' : 'bg-rose-500 text-white'}`}>{badge}</span>}
            </button>
          );
        }

        function StatCard({ title, amount, icon, color }) {
          return (
            <div className={`p-6 rounded-3xl border shadow-sm flex items-center justify-between ${color}`}>
              <div>
                <p className="text-[10px] font-black uppercase tracking-widest opacity-70 mb-1">{title}</p>
                <h4 className="text-3xl font-black">${amount.toLocaleString('es-MX')}</h4>
              </div>
              <div className="w-12 h-12 rounded-full bg-white/50 flex items-center justify-center">
                {React.cloneElement(icon, { className: 'w-6 h-6' })}
              </div>
            </div>
          );
        }

        function ClientsModule({ db, clients, clientNotes, showToast }) {
          const [editingNoteId, setEditingNoteId] = useState(null);
          const [noteText, setNoteText] = useState('');

          const openNoteEditor = (clientId, currentNote) => {
            setEditingNoteId(clientId);
            setNoteText(currentNote || '');
          };

          const saveNote = async () => {
            try {
              await setDoc(doc(db, 'clientes', editingNoteId), { notas: noteText }, { merge: true });
              showToast('Observaciones actualizadas correctamente');
              setEditingNoteId(null);
            } catch (err) {
              console.error(err);
              showToast('Error al guardar observaciones', 'error');
            }
          };

          return (
            <div className="animate-fade-in space-y-6 pb-20">
              <h2 className="text-3xl font-black text-slate-800 mb-6">Directorio VIP (CRM)</h2>
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {clients.map(c => (
                  <div key={c.id} className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-all flex flex-col">
                    <div className="flex justify-between items-start mb-2">
                      <h3 className="text-lg font-black text-slate-800 truncate pr-2">{c.name}</h3>
                      <a href={`https://wa.me/52${c.phone.replace(/\D/g, '')}`} target="_blank" rel="noopener noreferrer" className="text-emerald-500 hover:text-emerald-600 transition-colors" title="Enviar WhatsApp">
                        <i className="fa-brands fa-whatsapp text-xl"></i>
                      </a>
                    </div>
                    <p className="text-sm text-slate-500 mb-4 font-medium">{c.phone}</p>
                    
                    <div className="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100 mb-4">
                      <div className="text-center">
                        <span className="block text-[10px] uppercase font-bold text-slate-400">Eventos</span>
                        <span className="font-black text-xl text-slate-700">{c.totalBookings}</span>
                      </div>
                      <div className="text-center">
                        <span className="block text-[10px] uppercase font-bold text-slate-400">Inversión</span>
                        <span className="font-black text-xl text-emerald-600">${c.totalSpent.toLocaleString()}</span>
                      </div>
                    </div>

                    <div className="mt-auto pt-4 border-t border-slate-100">
                      <div className="flex justify-between items-center mb-2">
                        <span className="text-[10px] font-bold uppercase tracking-widest text-slate-400">Observaciones</span>
                        <button onClick={() => openNoteEditor(c.id, clientNotes[c.id])} className="text-xs text-blue-500 hover:text-blue-700 font-bold">
                          <i className="fa-solid fa-pen"></i> Editar
                        </button>
                      </div>
                      <p className="text-xs text-slate-600 italic bg-amber-50 p-3 rounded-lg border border-amber-100 min-h-[40px]">
                        {clientNotes[c.id] || 'Sin observaciones registradas...'}
                      </p>
                    </div>
                  </div>
                ))}
              </div>

              {editingNoteId && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-fade-in">
                  <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden p-6">
                    <h3 className="font-black text-xl text-slate-800 mb-2">Observaciones del Cliente</h3>
                    <p className="text-xs text-slate-500 mb-4">Anota si hubo algún problema, detalle a considerar, o si son clientes excelentes.</p>
                    <textarea 
                      className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-emerald-500 text-sm text-slate-700 resize-none mb-4" 
                      rows="4" 
                      value={noteText} 
                      onChange={(e) => setNoteText(e.target.value)}
                      placeholder="Ej. Dejaron muy sucio, son clientes frecuentes..."
                    ></textarea>
                    <div className="flex gap-3">
                      <button onClick={() => setEditingNoteId(null)} className="flex-1 py-3 bg-slate-100 text-slate-600 font-bold hover:bg-slate-200 rounded-xl transition-colors">Cancelar</button>
                      <button onClick={saveNote} className="flex-1 py-3 bg-emerald-600 text-white font-bold hover:bg-emerald-700 rounded-xl transition-colors shadow-lg shadow-emerald-200">Guardar Notas</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        function QuotesModule({ db, quotes, showToast, onConvertToBooking }) {
          const [form, setForm] = useState({
            name: '', phone: '', email: '', date: '', type: '', guests: '50', includesDepto: false, discount: 0
          });

          const d = form.date ? new Date(form.date + 'T12:00:00') : new Date();
          const isWknd = d.getDay() === 0 || d.getDay() === 5 || d.getDay() === 6;
          
          const salonPrice = isWknd ? 5000 : 4000;
          const deptoPrice = isWknd ? 2000 : 1600;
          const subtotal = salonPrice + (form.includesDepto ? deptoPrice : 0);
          const discountAmount = subtotal * ((Number(form.discount) || 0) / 100);
          const totalPrice = subtotal - discountAmount;

          const handleSaveQuote = async (e) => {
            e.preventDefault();
            if (!form.name || !form.date) return showToast('Nombre y Fecha son obligatorios', 'error');
            try {
              await addDoc(collection(db, 'cotizaciones'), {
                cliente_nombre: form.name,
                cliente_telefono: form.phone,
                cliente_correo: form.email,
                date: form.date,
                type: form.type,
                guests: form.guests,
                depto_incluido: form.includesDepto,
                descuento_aplicado: Number(form.discount) || 0,
                precio_total: totalPrice,
                isWeekend: isWknd,
                timestamp: Date.now()
              });
              showToast('Cotización guardada exitosamente');
              setForm({ name: '', phone: '', email: '', date: '', type: '', guests: '50', includesDepto: false, discount: 0 });
            } catch (err) {
              console.error(err);
              showToast('Error al guardar la cotización', 'error');
            }
          };

          const handleLoadQuote = (q) => {
            setForm({
              name: q.cliente_nombre || '',
              phone: q.cliente_telefono || '',
              email: q.cliente_correo || '',
              date: q.date || '',
              type: q.type || '',
              guests: q.guests || '50',
              includesDepto: q.depto_incluido || false,
              discount: q.descuento_aplicado || 0
            });
            showToast('Cotización lista para generar PDF');
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const handleDeleteQuote = async (id) => {
            if(window.confirm('¿Eliminar esta cotización de forma permanente?')) {
              try {
                await deleteDoc(doc(db, 'cotizaciones', id));
                showToast('Cotización eliminada');
              } catch(err) { showToast('Error al eliminar', 'error'); }
            }
          };

          const handleDownloadPDF = async () => {
            const element = document.getElementById('quote-preview-doc');
            if (!element || !window.html2canvas) return showToast('Error al generar PDF', 'error');
            try {
              showToast('Generando Documento Oficial...');
              const canvas = await window.html2canvas(element, { scale: 3, useCORS: true, backgroundColor: '#ffffff' }); 
              const link = document.createElement('a');
              link.download = `Cotizacion_${form.name || 'CasaCopal'}.png`;
              link.href = canvas.toDataURL('image/png');
              link.click();
            } catch (err) { showToast('Error al exportar', 'error'); }
          };

          return (
            <div className="animate-fade-in space-y-6 pb-20">
              <div>
                <h2 className="text-3xl font-black text-slate-800">Cotizador Dinámico</h2>
                <p className="text-slate-500 font-medium">Crea cotizaciones elegantes y conviértelas en reservas con un clic.</p>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                
                <div className="space-y-8">
                  <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2"><i className="fa-solid fa-file-invoice text-blue-600"></i> Nueva Cotización</h3>
                    <form onSubmit={handleSaveQuote} className="space-y-4">
                      <div>
                        <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Cliente</label>
                        <input type="text" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 text-sm font-bold text-slate-700" placeholder="Ej. Ana Pérez" value={form.name} onChange={e=>setForm({...form, name: e.target.value})} required/>
                      </div>
                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Teléfono</label>
                          <input type="tel" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 text-sm" placeholder="Opcional" value={form.phone} onChange={e=>setForm({...form, phone: e.target.value})}/>
                        </div>
                        <div>
                          <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Fecha</label>
                          <input type="date" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 text-sm" value={form.date} onChange={e=>setForm({...form, date: e.target.value})} required/>
                        </div>
                      </div>
                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Tipo de Evento</label>
                          <input type="text" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 text-sm" placeholder="Ej. Boda" value={form.type} onChange={e=>setForm({...form, type: e.target.value})}/>
                        </div>
                        <div>
                          <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Invitados</label>
                          <input type="number" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 text-sm" value={form.guests} onChange={e=>setForm({...form, guests: e.target.value})}/>
                        </div>
                      </div>
                      <div>
                        <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Correo Electrónico</label>
                        <input type="email" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 text-sm" placeholder="Opcional" value={form.email} onChange={e=>setForm({...form, email: e.target.value})}/>
                      </div>
                      <div className="flex items-center gap-4 bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <label className="flex items-center gap-2 text-sm font-bold text-slate-700 cursor-pointer">
                          <input type="checkbox" className="w-4 h-4 text-blue-600 rounded" checked={form.includesDepto} onChange={e=>setForm({...form, includesDepto: e.target.checked})}/> + Depto Privado
                        </label>
                        <div className="flex-1">
                           <input type="number" placeholder="Descuento %" className="w-full p-2 bg-white border border-slate-200 rounded-lg outline-none focus:border-blue-500 text-sm text-blue-700 font-bold" value={form.discount || ''} onChange={e=>setForm({...form, discount: e.target.value})}/>
                        </div>
                      </div>
                      <button type="submit" className="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-colors shadow-md shadow-blue-200">Guardar Cotización</button>
                    </form>
                  </div>

                  <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                    <div className="p-4 border-b border-slate-100 bg-slate-50">
                      <h3 className="font-bold text-slate-800 text-sm">Cotizaciones Guardadas</h3>
                    </div>
                    <div className="divide-y divide-slate-100 max-h-[400px] overflow-y-auto">
                      {quotes.length === 0 ? <p className="p-6 text-center text-sm text-slate-400">No hay cotizaciones registradas</p> : quotes.map(q => (
                        <div key={q.id} className="p-4 hover:bg-slate-50 flex justify-between items-center group">
                          <div>
                            <p className="font-bold text-slate-800 text-sm">{q.cliente_nombre}</p>
                            <p className="text-xs text-slate-500"><i className="fa-regular fa-calendar mr-1"></i> {q.date} • ${q.precio_total?.toLocaleString()}</p>
                          </div>
                          <div className="flex flex-col gap-2 items-end">
                            <div className="flex gap-2">
                               <button onClick={() => handleLoadQuote(q)} className="text-[10px] bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg font-bold hover:bg-blue-200 transition-colors shadow-sm whitespace-nowrap"><i className="fa-solid fa-eye mr-1"></i> Ver / Exportar</button>
                               <button onClick={() => onConvertToBooking(q)} className="text-[10px] bg-emerald-100 text-emerald-700 px-3 py-1.5 rounded-lg font-bold hover:bg-emerald-200 transition-colors shadow-sm whitespace-nowrap"><i className="fa-solid fa-bolt text-emerald-500 mr-1"></i> Convertir a Reserva</button>
                            </div>
                            <button onClick={() => handleDeleteQuote(q.id)} className="text-[9px] text-rose-400 hover:text-rose-600 hover:underline">Eliminar</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                <div className="flex flex-col items-center gap-4">
                  <div id="quote-preview-doc" className="bg-white p-10 border border-slate-200 shadow-xl w-full max-w-[450px] relative overflow-hidden" style={{ fontFamily: "'Montserrat', sans-serif" }}>
                     <div className="absolute top-0 left-0 right-0 h-2 bg-emerald-600"></div>
                     <div className="text-center pb-6 mb-6 border-b border-slate-100">
                        <h1 className="text-3xl font-black text-slate-900 tracking-tight mb-1">CASA COPAL</h1>
                        <p className="text-emerald-600 text-[10px] font-bold tracking-[0.3em] uppercase">Cotización Oficial</p>
                        <p className="text-[9px] text-slate-400 mt-2 tracking-widest uppercase">ID: COT-{Date.now().toString().slice(-4)}</p>
                     </div>

                     <div className="bg-slate-50 p-4 rounded-xl mb-6">
                        <div className="grid grid-cols-2 gap-4 text-xs">
                           <div>
                             <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Cliente</p>
                             <p className="font-bold text-slate-800">{form.name || '_________________'}</p>
                           </div>
                           <div>
                             <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Fecha Evento</p>
                             <p className="font-bold text-slate-800">{form.date || '_________________'}</p>
                           </div>
                           <div>
                             <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Tipo Evento</p>
                             <p className="font-bold text-slate-800">{form.type || '_________________'}</p>
                           </div>
                           <div>
                             <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Invitados</p>
                             <p className="font-bold text-slate-800">{form.guests || '50'} Max</p>
                           </div>
                           <div className="col-span-2">
                             <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Correo</p>
                             <p className="font-bold text-slate-800 break-all">{form.email || '_________________'}</p>
                           </div>
                        </div>
                     </div>

                     <h4 className="text-[10px] font-black text-slate-800 uppercase tracking-widest mb-3 border-b-2 border-slate-900 inline-block pb-1">Desglose de Costos</h4>
                     <div className="space-y-3 mb-8">
                        <div className="flex justify-between items-center text-sm">
                           <span className="text-slate-600 font-medium">Renta de Salón Principal (7 hrs)</span>
                           <span className="font-bold text-slate-800">${salonPrice.toLocaleString('es-MX')}</span>
                        </div>
                        {form.includesDepto && (
                           <div className="flex justify-between items-center text-sm">
                              <span className="text-slate-600 font-medium">Departamento Privado</span>
                              <span className="font-bold text-slate-800">${deptoPrice.toLocaleString('es-MX')}</span>
                           </div>
                        )}
                        {Number(form.discount) > 0 && (
                           <div className="flex justify-between items-center text-sm text-rose-500">
                              <span className="font-medium">Descuento ({form.discount}%)</span>
                              <span className="font-bold">-${discountAmount.toLocaleString('es-MX')}</span>
                           </div>
                        )}
                        
                        <div className="pt-3 border-t border-slate-200 flex justify-between items-center">
                           <span className="text-sm font-black text-slate-900 uppercase tracking-wider">Total Acordado</span>
                           <span className="text-2xl font-black text-emerald-600">${totalPrice.toLocaleString('es-MX')}</span>
                        </div>
                     </div>

                     <div className="bg-slate-50 p-4 rounded-xl text-[9px] text-slate-500 leading-relaxed font-medium">
                        <p className="mb-2"><strong className="text-slate-700">Términos y Condiciones:</strong></p>
                        <ul className="list-disc pl-3 space-y-1">
                          <li>Cotización válida por 7 días. Disponibilidad sujeta a confirmación.</li>
                          <li>Para bloquear la fecha formalmente se requiere un anticipo del 50%.</li>
                          <li>Se requiere un depósito en garantía de $1,500 MXN el día del evento (reembolsable).</li>
                        </ul>
                     </div>

                     <div className="mt-8 text-center border-t border-slate-100 pt-4">
                        <p className="text-[10px] font-bold text-slate-800 mb-1">WhatsApp: 624 320 3289</p>
                        <p className="text-[9px] text-slate-400 tracking-widest"><i className="fa-solid fa-globe text-emerald-500"></i> {"www." + "casacopal.com.mx"}</p>
                     </div>
                  </div>

                  <button onClick={handleDownloadPDF} className="bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 px-8 rounded-full transition-colors shadow-lg flex items-center gap-2 w-full max-w-[450px] justify-center">
                    <i className="fa-solid fa-download"></i> Exportar a Imagen Oficial
                  </button>
                </div>
              </div>
            </div>
          );
        }

        function BookingsModule({ db, bookings, showToast, initialData, clearInitialData }) {
          const [form, setForm] = useState({ date: '', name: '', phone: '', email: '', isWeekend: false, includesDepto: false, discount: 0, anticipo: '' });
          const [bookingToFree, setBookingToFree] = useState(null); 
          const [editingBooking, setEditingBooking] = useState(null); 
          const [bookingToLiquidate, setBookingToLiquidate] = useState(null);
          
          useEffect(() => {
            if (initialData) {
              const d = new Date(initialData.date + 'T12:00:00');
              const isWknd = d.getDay() === 0 || d.getDay() === 5 || d.getDay() === 6;
              setForm(prev => ({...prev, date: initialData.date, name: initialData.cliente_nombre, phone: initialData.cliente_telefono, email: initialData.cliente_correo || '', includesDepto: initialData.depto_incluido, discount: initialData.descuento_aplicado, isWeekend: isWknd}));
              showToast('Datos de cotización cargados en el formulario');
              clearInitialData();
            }
          }, []);

          const calculatedTotal = useMemo(() => {
            let base = form.isWeekend ? 5000 : 4000;
            let depto = form.isWeekend ? 2000 : 1600;
            let subtotal = base + (form.includesDepto ? depto : 0);
            return subtotal - (subtotal * ((form.discount || 0) / 100));
          }, [form.isWeekend, form.includesDepto, form.discount]);

          const handleExportReservationsToCSV = () => {
            if (bookings.length === 0) {
              showToast('No hay reservas para exportar', 'error');
              return;
            }

            const headers = ['Fecha', 'Cliente', 'Teléfono', 'Correo', 'Total', 'Anticipo', 'Estatus', 'Depto Incluido', 'Origen'];
            const csvData = bookings.map(b => [
              b._fechaStr || '',
              `"${b._nombreStr || ''}"`,
              b._telefonoStr || '',
              b._correoStr || '',
              b._precioTotal || 0,
              b._anticipo || 0,
              b._status || '',
              b.depto_incluido ? 'Sí' : 'No',
              b.origen || ''
            ]);

            const csvContent = [headers.join(','), ...csvData.map(row => row.join(','))].join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `CasaCopal_Reservas_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast('Archivo de reservas descargado');
          };

          const handleBlockDate = async (e) => {
            e.preventDefault();
            if (!form.date) return showToast('Selecciona una fecha', 'error');

            const isDateAlreadyBooked = bookings.some(b => b._fechaStr === form.date);
            if (isDateAlreadyBooked) return showToast('⚠️ ¡Alto! Esta fecha ya está reservada o bloqueada.', 'error');

            const anticipoNum = Number(form.anticipo) || 0;
            const newStatus = anticipoNum > 0 ? 'Anticipado' : 'Pendiente';

            try {
              await setDoc(doc(db, 'reservaciones', form.date), { 
                date: form.date, 
                status: newStatus,
                precio_total: calculatedTotal,
                anticipo: anticipoNum,
                depto_incluido: form.includesDepto,
                cliente_nombre: form.name || 'Bloqueo Interno',
                cliente_telefono: form.phone || '',
                cliente_correo: form.email || '',
                descuento_aplicado: form.discount || 0,
                origen: 'hub_interno',
                timestamp: new Date().toISOString()
              });
              showToast(anticipoNum > 0 ? 'Fecha reservada' : 'Fecha bloqueada');
              setForm({ date: '', name: '', phone: '', email: '', isWeekend: false, includesDepto: false, discount: 0, anticipo: '' });
            } catch(err) { console.error(err); showToast('Error al bloquear', 'error'); }
          };

          const handleApproveWebBooking = async (id) => {
            const amount = window.prompt("Ingresa el monto del anticipo recibido ($) - Ingresa 0 si aún no han pagado:", "2500");
            if (amount !== null) {
              const anticipoNum = Number(amount) || 0;
              const newStatus = anticipoNum > 0 ? 'Anticipado' : 'Pendiente';
              try {
                await updateDoc(doc(db, 'reservaciones', id), { status: newStatus, anticipo: anticipoNum });
                showToast(anticipoNum > 0 ? 'Reserva aprobada.' : 'Reserva Pendiente.');
              } catch(err) { console.error(err); }
            }
          };

          const confirmLiquidar = async () => {
            if (!bookingToLiquidate) return;
            try {
              await updateDoc(doc(db, 'reservaciones', bookingToLiquidate.id), { status: 'Liquidado', anticipo: Number(bookingToLiquidate._precioTotal) });
              showToast('Evento Liquidado Exitosamente');
              setBookingToLiquidate(null);
            } catch(err) { console.error(err); showToast('Error al liquidar', 'error'); }
          };

          const confirmFreeDate = async () => {
            if (!bookingToFree) return;
            try {
              await deleteDoc(doc(db, 'reservaciones', bookingToFree.id)); 
              showToast('Fecha liberada');
              setBookingToFree(null); 
            } catch(err) { console.error(err); showToast('Error al liberar', 'error'); }
          };

          const handleUpdateBooking = async (e) => {
            e.preventDefault();
            if (!editingBooking) return;

            const total = Number(editingBooking.precio_total);
            const anticipo = Number(editingBooking.anticipo);
            
            let newStatus = 'Pendiente';
            if (total === 0) newStatus = 'Liquidado'; 
            else if (anticipo >= total && total > 0) newStatus = 'Liquidado';
            else if (anticipo > 0) newStatus = 'Anticipado';

            try {
              await updateDoc(doc(db, 'reservaciones', editingBooking.id), { 
                cliente_nombre: editingBooking.cliente_nombre,
                cliente_telefono: editingBooking.cliente_telefono || '',
                cliente_correo: editingBooking.cliente_correo || '',
                date: editingBooking.date, 
                precio_total: total,
                anticipo: anticipo,
                status: newStatus,
                depto_incluido: editingBooking.depto_incluido || false
              });
              showToast('Reserva actualizada correctamente');
              setEditingBooking(null);
            } catch(err) {
              console.error(err);
              showToast('Error al actualizar', 'error');
            }
          };

          const handleEditDeptoToggle = (e) => {
            const isChecked = e.target.checked;
            const d = new Date(editingBooking.date + 'T12:00:00');
            const isWknd = d.getDay() === 0 || d.getDay() === 5 || d.getDay() === 6;
            const deptoPrice = isWknd ? 2000 : 1600;
            const discount = Number(editingBooking.descuento_aplicado || 0);
            const deptoFinalPrice = deptoPrice - (deptoPrice * (discount / 100));

            setEditingBooking(prev => ({
              ...prev, depto_incluido: isChecked, precio_total: Math.round(isChecked ? Number(prev.precio_total) + deptoFinalPrice : Number(prev.precio_total) - deptoFinalPrice)
            }));
          };

          return (
            <div className="animate-fade-in space-y-6">
              <div className="flex justify-between items-end">
                <div>
                  <h2 className="text-3xl font-black text-slate-800">Centro de Reservas</h2>
                  <p className="text-slate-500">Unificación de Página Web y Bloqueos Manuales.</p>
                </div>
                <button onClick={handleExportReservationsToCSV} className="bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-bold py-2 px-4 rounded-xl shadow-md transition-colors flex items-center gap-2">
                  <FileSpreadsheet className="w-4 h-4"/> Descargar a Excel
                </button>
              </div>

              <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2"><i className="fa-solid fa-lock text-emerald-600"></i> Agendar Evento y Anticipo</h3>
                <form onSubmit={handleBlockDate} className="space-y-4">
                  <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div className="md:col-span-2">
                      <label className="block text-xs font-bold text-slate-500 mb-1">Nombre del Cliente</label>
                      <input type="text" placeholder="Ej. Familia López" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all text-sm" value={form.name} onChange={e => setForm({...form, name: e.target.value})} required/>
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-slate-500 mb-1">Teléfono</label>
                      <input type="tel" placeholder="Ej. 624..." className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all text-sm" value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-slate-500 mb-1">Correo (Opcional)</label>
                      <input type="email" placeholder="correo@..." className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all text-sm" value={form.email} onChange={e => setForm({...form, email: e.target.value})} />
                    </div>
                  </div>
                  <div className="grid grid-cols-2 md:grid-cols-5 gap-4 items-end">
                    <div>
                      <label className="block text-xs font-bold text-slate-500 mb-1">Fecha</label>
                      <input type="date" required className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all text-sm" value={form.date} onChange={e => {
                        const d = new Date(e.target.value + 'T12:00:00');
                        const isWknd = d.getDay() === 0 || d.getDay() === 5 || d.getDay() === 6;
                        setForm({...form, date: e.target.value, isWeekend: isWknd});
                      }} />
                    </div>
                    <div className="flex items-center justify-center h-[44px]">
                      <label className="flex items-center gap-2 text-sm font-bold cursor-pointer text-slate-700 bg-slate-50 border border-slate-200 px-3 py-2.5 rounded-lg w-full">
                        <input type="checkbox" className="w-4 h-4 text-emerald-600 rounded" checked={form.includesDepto} onChange={e => setForm({...form, includesDepto: e.target.checked})} /> + Depto
                      </label>
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-blue-600 mb-1">Descuento (%)</label>
                      <input type="number" min="0" max="100" placeholder="0" className="w-full p-2.5 bg-blue-50 border border-blue-200 text-blue-700 font-bold rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm" value={form.discount || ''} onChange={e => setForm({...form, discount: e.target.value})} />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-emerald-600 mb-1">Anticipo ($)</label>
                      <input type="number" required placeholder="0" className="w-full p-2.5 bg-emerald-50 border border-emerald-200 text-emerald-700 font-bold rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all text-sm" value={form.anticipo} onChange={e => setForm({...form, anticipo: e.target.value})} />
                      <p className="text-[10px] text-slate-500 mt-1 font-bold absolute">Total: ${calculatedTotal.toLocaleString()}</p>
                    </div>
                    <div className="col-span-2 md:col-span-1">
                      <button type="submit" className="bg-slate-900 text-white font-bold py-2.5 rounded-lg hover:bg-slate-800 transition-colors w-full flex items-center justify-center gap-2 shadow-md">
                        <i className="fa-solid fa-save"></i> Guardar
                      </button>
                    </div>
                  </div>
                </form>
              </div>

              <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                <div className="bg-white border-b border-slate-100 px-8 py-6 flex justify-between items-center">
                  <h3 className="font-black text-xl text-slate-800">Próximos Eventos</h3>
                  <span className="text-xs text-slate-400 font-bold uppercase tracking-widest"><i className="fa-solid fa-arrow-down-1-9"></i> Orden cronológico</span>
                </div>
                <div className="overflow-x-auto pb-2">
                  <table className="w-full text-left border-collapse min-w-[950px]">
                    <thead>
                      <tr className="text-slate-400 text-xs font-bold uppercase tracking-widest border-b border-slate-100">
                        <th className="p-6 font-bold w-12 text-center"></th>
                        <th className="p-6 font-bold w-32">Fecha</th>
                        <th className="p-6 font-bold">Cliente / Info</th>
                        <th className="p-6 font-bold text-center">Estado</th>
                        <th className="p-6 font-bold w-48">Finanzas</th>
                        <th className="p-6 font-bold text-right w-48">Acciones</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-50">
                      {bookings.length === 0 ? (
                        <tr><td colSpan="6" className="p-12 text-center text-slate-400 font-bold">Sin eventos en la base de datos</td></tr>
                      ) : bookings.map(b => {
                        const total = b._precioTotal;
                        const anticipo = b._anticipo;
                        const saldo = total - anticipo;
                        const status = b._status === 'Confirmada' ? 'Anticipado' : b._status; 
                        
                        return (
                        <tr key={b.id} className={`hover:bg-slate-50/50 transition-colors ${b._fechaStr && b._fechaStr < new Date().toISOString().split('T')[0] ? 'opacity-60' : ''}`}>
                          <td className="p-6 align-top text-center">
                            <button onClick={() => setEditingBooking({...b, date: b._fechaStr, cliente_nombre: b._nombreStr, cliente_telefono: b._telefonoStr, cliente_correo: b._correoStr, precio_total: b._precioTotal, anticipo: b._anticipo})} className="w-10 h-10 bg-slate-200 text-slate-700 hover:bg-emerald-100 hover:text-emerald-700 rounded-full transition-colors flex items-center justify-center shadow-md mx-auto" title="Editar Reserva">
                              <i className="fa-solid fa-pen text-base"></i>
                            </button>
                          </td>
                          <td className="p-6 align-top text-center">
                            {status === 'Liquidado' ? (
                              <span className="bg-emerald-100 text-emerald-700 border border-emerald-200 px-3 py-1.5 rounded-md text-[10px] font-black uppercase tracking-widest block"><i className="fa-solid fa-check-double mr-1"></i> {b._precioTotal === 0 ? 'Cortesía' : 'Liquidado'}</span>
                            ) : status === 'Anticipado' ? (
                              <span className="bg-blue-100 text-blue-700 border border-blue-200 px-3 py-1.5 rounded-md text-[10px] font-black uppercase tracking-widest block"><i className="fa-solid fa-bookmark mr-1"></i> Anticipo Pagado</span>
                            ) : (
                              <span className="bg-amber-100 text-amber-700 border border-amber-200 px-3 py-1.5 rounded-md text-[10px] font-black uppercase tracking-widest block"><i className="fa-regular fa-clock mr-1"></i> Pendiente</span>
                            )}
                          </td>
                          <td className="p-6 align-top">
                            <span className="font-black text-slate-800 text-lg">{b._fechaStr || 'Sin Fecha'}</span>
                            <div className="mt-2">
                              {b.origen === 'Web' ? 
                                <span className="inline-block bg-purple-50 text-purple-700 border border-purple-100 px-2 py-1 rounded text-[9px] font-black uppercase tracking-widest"><i className="fa-solid fa-globe"></i> Web</span> : 
                                <span className="inline-block bg-slate-50 text-slate-600 border border-slate-200 px-2 py-1 rounded text-[9px] font-black uppercase tracking-widest"><i className="fa-solid fa-mobile-screen"></i> Hub</span>
                              }
                            </div>
                          </td>
                          <td className="p-6 align-top">
                            <p className="font-black text-slate-800 mb-2 text-sm">{b._nombreStr}</p>
                            <div className="flex flex-col gap-1.5">
                              {b._telefonoStr && (
                                <a href={`https://wa.me/52${b._telefonoStr.replace(/\D/g, '')}`} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1.5 text-[10px] text-emerald-700 font-bold bg-emerald-50 border border-emerald-100 px-2 py-1 rounded w-fit hover:bg-emerald-100 transition-colors shadow-sm" title="Abrir chat de WhatsApp"><i className="fa-brands fa-whatsapp text-emerald-500 text-sm"></i> {b._telefonoStr}</a>
                              )}
                              {b._correoStr && (
                                <span className="inline-flex items-center gap-1.5 text-[10px] text-slate-500 font-medium"><i className="fa-regular fa-envelope text-slate-400"></i> {b._correoStr}</span>
                              )}
                            </div>
                          </td>
                          <td className="p-6 align-top">
                            <div className="bg-slate-50 p-3 rounded-lg border border-slate-100 relative">
                              <div className="flex justify-between items-start mb-1 gap-2">
                                <p className="text-xs text-slate-500 font-medium">Total: <strong className="text-slate-800">${total.toLocaleString()}</strong></p>
                                <div className="shrink-0">{b.depto_incluido ? <span className="bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded text-[8px] font-black uppercase tracking-widest shadow-sm whitespace-nowrap">+ Depto</span> : <span className="bg-slate-200 text-slate-500 px-1.5 py-0.5 rounded text-[8px] font-black uppercase tracking-widest shadow-sm whitespace-nowrap">Solo Salón</span>}</div>
                              </div>
                              <p className="text-xs text-slate-500 font-medium mb-1">Anticipo: <strong className="text-emerald-600">${anticipo.toLocaleString()}</strong></p>
